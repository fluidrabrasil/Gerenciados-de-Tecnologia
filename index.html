<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Tecnologia – Fluidra</title>
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F5FA;color:#001a70;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;color:#001a70;}
/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#F0F5FA;}
::-webkit-scrollbar-thumb{background:#C5D8E8;border-radius:3px;}

/* ─── HEADER ─── */
#header{background:#001a70;height:56px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hd-left{display:flex;align-items:center;gap:12px;}
.hd-logo{width:32px;height:32px;background:#8393ff;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px;flex-shrink:0;}
.hd-title{color:#fff;font-weight:700;font-size:16px;letter-spacing:.5px;}
.hd-sub{color:#7EB8E0;font-size:13px;margin-left:4px;}
.hd-back{background:rgba(255,255,255,.12);border:none;border-radius:6px;padding:5px 12px;color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.hd-back:hover{background:rgba(255,255,255,.2);}
.hd-ata-title{color:#fff;font-weight:700;font-size:14px;}
.hd-ata-sub{color:#7EB8E0;font-size:13px;}
.hd-divider{width:1px;height:24px;background:rgba(255,255,255,.2);}
.hd-btns{display:flex;gap:8px;}
.btn-primary{background:#8393ff;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:13px;font-weight:700;}
.btn-primary:hover{background:#001a70;}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:6px;padding:7px 18px;font-size:13px;font-weight:700;}
.btn-outline:hover{background:rgba(255,255,255,.1);}

/* ─── TOOLBAR ─── */
#toolbar{padding:16px 28px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.sel{border-radius:6px;border:1.5px solid #C5D8E8;padding:6px 12px;font-size:13px;color:#001a70;background:#fff;outline:none;}
.sel:focus{border-color:#8393ff;}
.view-group{display:flex;background:#E0EBF5;border-radius:8px;padding:3px;gap:2px;}
.view-btn{padding:5px 14px;border-radius:6px;border:none;font-size:12px;font-weight:700;background:transparent;color:#001a70;transition:all .2s;}
.view-btn.active{background:#001a70;color:#fff;}
.toggle-btn{padding:5px 14px;border-radius:6px;border:1.5px solid #C5D8E8;font-size:12px;font-weight:700;background:#fff;color:#001a70;transition:all .2s;}
.toggle-btn.active{background:#001a70;color:#fff;border-color:#001a70;}
.progress-info{margin-left:auto;display:flex;align-items:center;gap:10px;}
.prog-bar{width:120px;height:7px;background:#C5D8E8;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#27AE60;border-radius:99px;transition:width .4s;}

/* ─── CONTENT ─── */
#content{padding:16px 28px 32px;}

/* ─── KANBAN ─── */
.kanban-wrap{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:flex-start;}
.kanban-col{min-width:300px;max-width:320px;flex:0 0 300px;}
.kanban-col-inner{border-radius:10px;border:1.5px solid transparent;overflow:hidden;transition:all .15s;}
.kanban-col-header{padding:10px 14px;border-bottom:2px solid;display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;}
.kanban-dot{width:9px;height:9px;border-radius:50%;}
.kanban-count{font-size:11px;font-weight:700;border-radius:10px;padding:1px 8px;}
.kanban-cards{padding:10px 10px 4px;min-height:80px;max-height:580px;overflow-y:auto;}
.kanban-empty{text-align:center;font-size:12px;padding:16px 8px 8px;border:2px dashed transparent;border-radius:8px;transition:all .15s;}
.kanban-drop-hint{border:2px dashed;border-radius:8px;}

/* ─── TASK CARD ─── */
.task-card{background:#fff;border-radius:8px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,26,112,.08);border-left:3px solid;margin-bottom:8px;cursor:grab;}
.task-card.done{opacity:.7;}
.task-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.task-card-left{display:flex;align-items:flex-start;gap:7px;flex:1;}
.task-card-title{font-weight:600;font-size:13px;line-height:1.4;}
.task-card-title.done{text-decoration:line-through;}
.task-card-actions{display:flex;gap:3px;flex-shrink:0;}
.task-card-desc{font-size:12px;color:#5A7A90;margin-top:4px;margin-left:20px;line-height:1.5;}
.task-card-meta{display:flex;gap:6px;margin-top:6px;margin-left:20px;flex-wrap:wrap;align-items:center;}
.card-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;}

/* ─── PROJECT CARDS ─── */
.project-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,26,112,.08);margin-bottom:14px;overflow:hidden;border:1.5px solid #E0EBF5;}
.project-card-header{padding:14px 20px;display:flex;align-items:center;gap:14px;}
.proj-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.proj-info{flex:1;min-width:0;}
.proj-name-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.proj-name{font-weight:700;font-size:14px;color:#001a70;}
.proj-progress-row{display:flex;align-items:center;gap:8px;}
.proj-prog-bar{flex:1;height:6px;background:#E0EBF5;border-radius:99px;overflow:hidden;}
.proj-prog-fill{height:100%;border-radius:99px;transition:width .4s;}
.proj-dates{text-align:right;flex-shrink:0;font-size:11px;color:#7A9BB5;line-height:1.9;}
.proj-toggle-btn{background:none;border:1.5px solid #C5D8E8;border-radius:6px;padding:5px 12px;color:#8393ff;font-weight:700;font-size:12px;flex-shrink:0;}
.proj-pills{padding:8px 20px 10px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;border-top:1px solid #EAF0F6;}
.status-pill{display:flex;align-items:center;gap:5px;border-radius:20px;padding:2px 10px;border:1px solid transparent;}
.status-pill-dot{width:7px;height:7px;border-radius:50%;}
.status-pill-label{font-size:11px;font-weight:600;}
.status-pill-count{font-size:11px;font-weight:700;border-radius:10px;padding:0 5px;}
.ata-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:#F7FAFD;border:1.5px solid #C5D8E8;border-radius:6px;padding:4px 12px;color:#001a70;font-size:12px;font-weight:700;}
.ata-btn:hover{background:#E0EBF5;}
.ata-badge{background:#001a70;color:#fff;border-radius:10px;padding:0 6px;font-size:10px;font-weight:700;}
.proj-tasks{padding:10px 20px 14px;border-top:1px solid #EAF0F6;}
.add-task-btn{margin-top:4px;width:100%;padding:7px;border-radius:6px;border:1.5px dashed #C5D8E8;background:transparent;color:#8393ff;font-size:13px;font-weight:600;}
.add-task-btn:hover{background:#F0F8FF;}
.no-tasks{color:#B0C8D8;font-size:13px;margin-bottom:10px;}

/* ─── EXECUTIVE / GANTT ─── */
.gantt-wrap{padding-bottom:32px;}
.gantt-zoom-box{background:#fff;border-radius:10px;border:1.5px solid #E0EBF5;padding:14px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,26,112,.06);}
.gantt-zoom-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.gantt-presets{display:flex;gap:6px;}
.gantt-preset-btn{padding:3px 12px;border-radius:6px;border:1.5px solid #C5D8E8;background:#F0F5FA;color:#001a70;font-size:11px;font-weight:700;}
.gantt-preset-btn:hover{background:#E0EBF5;}
.gantt-slider-track{position:relative;height:24px;background:#F0F5FA;border-radius:6px;margin-bottom:8px;user-select:none;}
.gantt-range-fill{position:absolute;top:0;bottom:0;background:rgba(131,147,255,.18);border:1.5px solid #8393ff;border-radius:4px;cursor:grab;}
.gantt-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:24px;background:#8393ff;border-radius:4px;cursor:ew-resize;z-index:5;display:flex;align-items:center;justify-content:center;}
.gantt-handle span{color:#fff;font-size:9px;}
.gantt-label-row{display:flex;justify-content:space-between;}
.gantt-period-label{font-size:11px;color:#7A9BB5;}
.gantt-table{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,26,112,.08);overflow:hidden;border:1.5px solid #E0EBF5;}
.gantt-table-scroll{overflow-x:auto;}
.gantt-header-row{display:flex;border-bottom:2px solid #E0EBF5;background:#F7FAFD;position:sticky;top:0;z-index:10;}
.gantt-name-col{border-right:1.5px solid #E0EBF5;flex-shrink:0;display:flex;align-items:center;padding:12px 16px;}
.gantt-name-col span{font-size:11px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.5px;}
.gantt-timeline-header{position:relative;flex-shrink:0;}
.gantt-month{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-right:1px solid #E0EBF5;}
.gantt-month.current{background:#EAF4FF;}
.gantt-month-name{font-size:13px;font-weight:600;color:#4A6E8A;}
.gantt-month-name.current{font-weight:800;color:#8393ff;}
.gantt-month-year{font-size:10px;color:#A0B8CC;font-weight:600;}
.gantt-month-year.current{color:#8393ff;}
.gantt-row{display:flex;border-bottom:2px solid #DDE8F2;min-height:56px;}
.gantt-row.even{background:#F4F8FD;}
.gantt-row.odd{background:#fff;}
.gantt-row-name{flex-shrink:0;padding:10px 16px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
.gantt-row-name-inner{display:flex;align-items:center;gap:6px;}
.gantt-row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gantt-row-label{font-size:12px;font-weight:700;color:#001a70;line-height:1.3;}
.gantt-row-progress{display:flex;align-items:center;gap:6px;padding-left:14px;}
.gantt-row-prog-bar{flex:1;height:4px;background:#E0EBF5;border-radius:99px;overflow:hidden;}
.gantt-row-prog-fill{height:100%;border-radius:99px;}
.gantt-timeline-row{position:relative;flex-shrink:0;}
.gantt-drag-over{outline:2px dashed #8393ff!important;background:rgba(131,147,255,.08)!important;}
.gantt-row-bar{position:absolute;top:50%;transform:translateY(-50%);height:28px;border-radius:7px;box-shadow:0 2px 6px rgba(0,0,0,.13);overflow:hidden;}
.gantt-bar-progress{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.22);border-radius:7px;}
.gantt-bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.gantt-bar-text{font-size:10px;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.35);padding:0 6px;}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:#F5A623;z-index:3;opacity:.9;}
.gantt-footer{display:flex;padding:10px 16px;background:#F7FAFD;border-top:1px solid #E0EBF5;gap:20px;flex-wrap:wrap;align-items:center;}
.gantt-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#7A9BB5;}
.gantt-legend-dot{width:14px;height:14px;border-radius:4px;}
.gantt-legend-line{width:16px;height:3px;border-radius:2px;}
.gantt-no-dates{margin-top:16px;}
.gantt-no-dates-title{font-size:12px;font-weight:700;color:#7A9BB5;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.gantt-no-dates-items{display:flex;gap:10px;flex-wrap:wrap;}
.gantt-nodates-card{background:#fff;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;border:1.5px solid transparent;}
.gantt-empty{text-align:center;color:#B0C8D8;font-size:14px;padding-top:40px;}

/* ─── ATA PAGE ─── */
.ata-wrap{padding:24px 32px;}
.ata-empty{text-align:center;padding:60px 0;color:#B0C8D8;}
.ata-empty-icon{font-size:40px;margin-bottom:12px;}
.ata-form-box{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,26,112,.10);border:1.5px solid #C5D8E8;}
.ata-form-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.ata-form-title{font-size:15px;font-weight:700;color:#001a70;}
.ata-form-grid{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:#001a70;display:block;margin-bottom:4px;}
.form-input{width:100%;border-radius:6px;border:1.5px solid #C5D8E8;padding:8px 10px;font-size:13px;box-sizing:border-box;color:#001a70;outline:none;}
.form-input:focus{border-color:#8393ff;}
.form-textarea{width:100%;border-radius:6px;border:1.5px solid #C5D8E8;padding:10px;font-size:13px;resize:vertical;min-height:140px;box-sizing:border-box;line-height:1.6;color:#001a70;outline:none;}
.form-textarea:focus{border-color:#8393ff;}
.ata-form-actions{display:flex;justify-content:flex-end;gap:10px;}
.btn-cancel{padding:8px 18px;border-radius:6px;border:1.5px solid #C5D8E8;background:#fff;color:#001a70;font-size:13px;font-weight:600;}
.btn-cancel:hover{background:#F0F5FA;}
.btn-save{padding:8px 22px;border-radius:6px;border:none;background:#001a70;color:#fff;font-size:13px;font-weight:700;}
.btn-save:hover{background:#002855;}
.btn-save:disabled{background:#B0C8D8;cursor:not-allowed;}
.ata-item{background:#fff;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,26,112,.07);border:1.5px solid #E0EBF5;overflow:hidden;}
.ata-item-header{display:flex;align-items:center;gap:14px;padding:14px 20px;}
.ata-date-box{text-align:center;border-radius:8px;padding:6px 10px;min-width:52px;flex-shrink:0;}
.ata-date-box.first{background:#001a70;}
.ata-date-box.other{background:#F0F5FA;}
.ata-date-day{font-size:18px;font-weight:800;line-height:1;}
.ata-date-day.first{color:#fff;}
.ata-date-day.other{color:#001a70;}
.ata-date-mon{font-size:10px;font-weight:600;margin-top:2px;}
.ata-date-mon.first{color:#7EB8E0;}
.ata-date-mon.other{color:#7A9BB5;}
.ata-item-info{flex:1;min-width:0;}
.ata-item-title-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.ata-newest-badge{background:#001a70;color:#fff;border-radius:4px;padding:1px 8px;font-size:10px;font-weight:700;}
.ata-title{font-weight:700;font-size:14px;color:#001a70;}
.ata-attendees{font-size:12px;color:#7A9BB5;display:flex;align-items:center;gap:4px;}
.ata-item-btns{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.ata-edit-btn{background:none;border:1.5px solid #C5D8E8;border-radius:6px;padding:4px 10px;color:#8393ff;font-size:12px;font-weight:600;}
.ata-del-btn{background:none;border:1.5px solid #FDE8E8;border-radius:6px;padding:4px 10px;color:#C0392B;font-size:12px;font-weight:600;}
.ata-toggle-btn{border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;}
.ata-body{padding:0 20px 18px;border-top:1px solid #EAF0F6;}
.ata-body-text{background:#F7FAFD;border-radius:8px;padding:14px 16px;margin-top:12px;font-size:13px;color:#334E68;line-height:1.8;white-space:pre-wrap;border-left:3px solid #8393ff;}
.ata-body-empty{padding:10px 20px 16px;border-top:1px solid #EAF0F6;font-size:13px;color:#B0C8D8;font-style:italic;}

/* ─── MODALS ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,30,60,.45);align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:12px;padding:28px;width:520px;max-width:95vw;box-shadow:0 8px 40px rgba(0,26,112,.18);max-height:90vh;overflow-y:auto;}
.modal-box.narrow{width:480px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:700;color:#001a70;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#7A9BB5;line-height:1;}
.modal-section{background:#F7FAFD;border-radius:8px;padding:14px 16px;margin-bottom:18px;border:1.5px solid #E0EBF5;}
.modal-section-title{font-size:11px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.modal-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.modal-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:12px;}
.form-group:last-child{margin-bottom:0;}
.form-select{width:100%;border-radius:6px;border:1.5px solid #C5D8E8;padding:8px 10px;font-size:13px;color:#001a70;box-sizing:border-box;outline:none;}
.form-select.error{border-color:#C0392B;}
.form-select:focus{border-color:#8393ff;}
.modal-tasks-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.task-count-badge{background:#E0EBF5;color:#001a70;border-radius:10px;padding:1px 8px;font-size:11px;}
.task-add-row{display:flex;gap:8px;margin-bottom:10px;}
.task-add-input{flex:1;border-radius:6px;border:1.5px solid #C5D8E8;padding:8px 10px;font-size:13px;color:#001a70;outline:none;}
.task-add-input:focus{border-color:#8393ff;}
.task-add-btn{padding:8px 16px;border-radius:6px;border:none;background:#8393ff;color:#fff;font-size:13px;font-weight:700;}
.task-empty-hint{text-align:center;color:#B0C8D8;font-size:12px;padding:14px 0;border:1.5px dashed #D8E8F0;border-radius:8px;}
.task-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F7FAFD;border-radius:6px;margin-bottom:6px;border:1px solid #E0EBF5;}
.task-item-dot{width:6px;height:6px;border-radius:50%;background:#7A9BB5;flex-shrink:0;}
.task-item-text{flex:1;font-size:13px;color:#001a70;}
.task-item-del{background:none;border:none;cursor:pointer;color:#C0392B;font-size:14px;padding:0 2px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.btn-modal-cancel{padding:8px 18px;border-radius:6px;border:1.5px solid #C5D8E8;background:#fff;color:#001a70;font-size:13px;font-weight:600;}
.btn-modal-cancel:hover{background:#F0F5FA;}
.btn-modal-save{padding:8px 22px;border-radius:6px;border:none;background:#001a70;color:#fff;font-size:13px;font-weight:700;}
.btn-modal-save:hover{background:#002855;}
.btn-modal-create{padding:8px 22px;border-radius:6px;border:none;background:#8393ff;color:#fff;font-size:13px;font-weight:700;}
.btn-modal-create:hover{background:#005a94;}
.btn-modal-create:disabled,.btn-modal-save:disabled{background:#B0C8D8;cursor:not-allowed;}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;}

/* ─── HOME PAGE ─── */
.home-wrap{min-height:100vh;display:flex;flex-direction:column;background:#f1efe9;}
.home-header{background:#001a70;height:72px;padding:0 36px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.home-logo{height:36px;width:auto;}
.home-brand{color:#fff;font-weight:700;font-size:17px;letter-spacing:.3px;}
.home-brand-sub{color:#7EB8E0;font-size:13px;margin-left:2px;}
.home-hero{padding:24px 36px 18px;max-width:900px;}
.home-hero-title{font-size:22px;font-weight:800;color:#001a70;line-height:1.2;margin-bottom:6px;}
.home-hero-sub{font-size:12px;color:#5A7A90;line-height:1.4;}
.home-section-label{padding:0 36px;font-size:11px;font-weight:700;color:#001a70;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;opacity:0.6;}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,280px));gap:10px;padding:0 36px 24px;}
.tool-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,26,112,.08);border:1.5px solid #dddce8;transition:all .2s;cursor:default;display:flex;flex-direction:column;}
.tool-card:hover{box-shadow:0 6px 24px rgba(0,26,112,.16);transform:translateY(-2px);border-color:#8393ff;}
.tool-card-banner{height:44px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}

/* ─── INVENTORY ─── */

.inv-pass-btn{background:#f1efe9;border:1.5px solid #dddce8;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;color:#001a70;cursor:pointer;white-space:nowrap;}

.inv-empty{text-align:center;padding:40px;color:#B0C8D8;font-size:14px;}
.inv-divider{border-top:2px solid #e5e3dd;margin:32px 0 24px;}
.inv-sub-section-title{font-size:13px;font-weight:700;color:#001a70;opacity:.7;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ─── MEU DIA ─── */
.meudia-wrap{padding:20px 28px 32px;}
.meudia-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.meudia-date-nav{display:flex;align-items:center;gap:6px;}
.meudia-date-btn{width:32px;height:32px;border-radius:6px;border:1.5px solid #C5D8E8;background:#fff;color:#001a70;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

.meudia-no-time{background:#fff;border-radius:10px;border:1.5px solid #E0EBF5;padding:12px 16px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,26,112,.06);}

.meudia-item-checkbox{width:16px;height:16px;border-radius:4px;border:2px solid #C5D8E8;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;}

.meudia-item-title{font-size:13px;color:#001a70;font-weight:600;flex:1;}

.meudia-item-del:hover{opacity:1;}
.meudia-tl-grid{position:relative;background:#fff;border-radius:10px;border:2px solid #BFD0DF;overflow:hidden;box-shadow:0 1px 6px rgba(0,26,112,.06);}
.meudia-tl-rows{position:relative;}
.meudia-tl-row{display:flex;align-items:stretch;height:64px;border-bottom:2px solid #C8D8EA;cursor:pointer;}
.meudia-tl-row:hover .meudia-tl-slot{background:#FAFCFF;}
.meudia-tl-row:last-child{border-bottom:none;}.meudia-tl-row:nth-child(even){background:#F6FAFD;}
.meudia-tl-hour{width:54px;flex-shrink:0;padding:8px 10px 0;font-size:12px;font-weight:700;color:#5A7E9A;text-align:right;border-right:2px solid #BFD0DF;background:#EEF3F8;}
.meudia-tl-slot{flex:1;}
.meudia-events-layer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
.meudia-event{position:absolute;border-radius:6px;padding:4px 8px;overflow:hidden;pointer-events:auto;cursor:pointer;}
.meudia-event.outlook{background:#EAF4FF;border-left:3px solid #001a70;}
.meudia-event.outlook:hover{background:#daeeff;}
.meudia-event.personal{background:#f0f2ff;border-left:3px solid #8393ff;}
.meudia-event.personal:hover{background:#e6e9ff;}
.meudia-event.personal.done{background:#EDFAF3;border-left-color:#27AE60;opacity:.8;}
.meudia-event-time{font-size:10px;font-weight:600;color:#7A9BB5;line-height:1.2;}
.meudia-event-title{font-size:12px;font-weight:700;color:#001a70;line-height:1.3;}
.meudia-event-loc{font-size:10px;color:#7A9BB5;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.meudia-now-line{position:absolute;left:54px;right:0;height:2px;background:#F5A623;pointer-events:none;z-index:10;}
.meudia-now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:#F5A623;}
.meudia-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.meudia-week-col{background:#fff;border-radius:10px;border:1.5px solid #E0EBF5;overflow:hidden;}
.meudia-week-col.today{border-color:#8393ff;}
.meudia-week-col-header{padding:8px 10px 6px;border-bottom:1px solid #E0EBF5;cursor:pointer;}
.meudia-week-col-header:hover{background:#F7FAFD;}
.meudia-week-dow{font-size:10px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.4px;}
.meudia-week-day{font-size:18px;font-weight:800;color:#001a70;line-height:1.2;}
.meudia-week-day.today-num{color:#8393ff;}
.meudia-week-events{padding:5px 5px 4px;display:flex;flex-direction:column;gap:2px;min-height:50px;}
.meudia-week-event{padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;}
.meudia-week-event.outlook{background:#EAF4FF;color:#001a70;}
.meudia-week-event.personal{background:#f0f2ff;color:#001a70;}
.meudia-week-event.done{background:#EDFAF3;color:#27AE60;text-decoration:line-through;}
.meudia-week-more{font-size:10px;color:#8393ff;font-weight:700;padding:1px 7px;cursor:pointer;}
.meudia-week-add{width:100%;background:none;border:none;border-top:1px solid #F0F5FA;padding:5px;color:#8393ff;font-size:11px;font-weight:700;cursor:pointer;}
.meudia-week-add:hover{background:#F7FAFD;}
.meudia-month-wrap{background:#fff;border-radius:10px;border:1.5px solid #E0EBF5;overflow:hidden;box-shadow:0 1px 6px rgba(0,26,112,.06);}
.meudia-month-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:2px solid #E0EBF5;}
.meudia-month-dow{padding:10px;text-align:center;font-size:11px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.4px;}
.meudia-month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.meudia-month-cell{border-right:1px solid #C8D8EA;border-bottom:1px solid #C8D8EA;min-height:90px;padding:6px 8px;cursor:pointer;}
.meudia-month-cell:nth-child(7n){border-right:none;}
.meudia-month-cell:hover{background:#E8F0F8;}
.meudia-month-cell.other-month{background:#EEF3F8;}
.meudia-month-cell.today-cell{background:#E4E8FF;border-left:3px solid #8393ff;}
.meudia-month-num{font-size:13px;font-weight:700;color:#001a70;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px;}
.meudia-month-num.today{background:#8393ff;color:#fff;}
.meudia-month-cell.other-month .meudia-month-num{color:#C0D0DC;}
.meudia-month-event{font-size:10px;font-weight:600;border-radius:3px;padding:1px 5px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.meudia-month-event.outlook{background:#EAF4FF;color:#001a70;}
.meudia-month-event.personal{background:#f0f2ff;color:#001a70;}
.meudia-month-event.done{background:#EDFAF3;color:#27AE60;text-decoration:line-through;}
.meudia-month-more{font-size:9px;color:#8393ff;font-weight:700;}
.meudia-outlook-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#EAF4FF;border-radius:8px;border:1px solid #C5D8E8;margin-bottom:12px;font-size:12px;color:#001a70;}
.meudia-outlook-dot{width:8px;height:8px;border-radius:50%;background:#27AE60;flex-shrink:0;}
.meudia-outlook-dot.loading{background:#F5A623;animation:pulse .8s infinite alternate;}
.meudia-outlook-dot.error{background:#C0392B;}
@keyframes pulse{from{opacity:.5}to{opacity:1}}

/* ─── POWER BI WIDGET ──────────────────────────────────────────────────────── */
.pbi-widget{background:#fff;border-radius:12px;border:1.5px solid #E0EBF5;padding:14px 18px 12px;box-shadow:0 2px 12px rgba(0,26,112,.07);}
.pbi-widget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.pbi-widget-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:#001a70;}
.pbi-badge{font-size:10px;border-radius:4px;padding:2px 8px;font-weight:700;border:1px solid;}
.pbi-badge.loading{background:#FFF8EC;color:#F5A623;border-color:#F5A62355;}
.pbi-badge.done{background:#EDFAF3;color:#27AE60;border-color:#27AE6055;}
.pbi-badge.warn{background:#FFF8EC;color:#F5A623;border-color:#F5A62355;}
.pbi-group-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.pbi-group-btn{border-radius:10px;border:none;padding:10px 14px;cursor:pointer;text-align:left;transition:all .2s;position:relative;overflow:hidden;}
.pbi-group-btn.idle{background:linear-gradient(135deg,#001a70 0%,#2a3db0 100%);}
.pbi-group-btn.idle:hover{opacity:.9;transform:translateY(-1px);}
.pbi-group-btn.loading{background:linear-gradient(135deg,#E8961A 0%,#F5A623 100%);cursor:default;}
.pbi-group-btn.done{background:linear-gradient(135deg,#1a8a4a 0%,#27AE60 100%);}
.pbi-group-btn.error{background:linear-gradient(135deg,#9a2a1f 0%,#C0392B 100%);}
.pbi-group-btn.error:hover{opacity:.9;}
.pbi-group-btn.unconfigured{background:#F0F5FA;cursor:not-allowed;opacity:.6;}
.pbi-group-name{font-size:12px;font-weight:800;color:#fff;margin-bottom:2px;letter-spacing:.3px;}
.pbi-group-sub{font-size:10px;color:rgba(255,255,255,.65);}
.pbi-group-status{font-size:10px;color:rgba(255,255,255,.9);margin-top:6px;font-weight:600;}
.pbi-group-btn.unconfigured .pbi-group-name,.pbi-group-btn.unconfigured .pbi-group-status{color:#7A9BB5;}
.pbi-group-btn.unconfigured .pbi-group-sub{color:#B0C4D0;}
.pbi-gbar{height:3px;background:rgba(255,255,255,.25);border-radius:99px;margin-top:7px;overflow:hidden;}
.pbi-gbar-fill{height:100%;background:#fff;border-radius:99px;transition:width 5s linear;}
.pbi-section-lbl{font-size:10px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.pbi-models-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.pbi-model-btn{border-radius:8px;border:1.5px solid #E0EBF5;padding:7px 9px;cursor:pointer;background:#F7FAFD;text-align:left;transition:all .15s;}
.pbi-model-btn:hover:not([disabled]){background:#EAF4FF;border-color:#8393ff;}
.pbi-model-btn.loading{background:#FFF8EC;border-color:#F5A623;cursor:default;}
.pbi-model-btn.done{background:#EDFAF3;border-color:#27AE60;}
.pbi-model-btn.error{background:#FDE8E8;border-color:#C0392B;}
.pbi-model-btn.unconfigured{opacity:.5;cursor:not-allowed;}
.pbi-model-name{font-size:10px;font-weight:700;color:#001a70;line-height:1.3;margin-bottom:3px;}
.pbi-model-status{font-size:9.5px;color:#7A9BB5;display:flex;align-items:center;gap:3px;}
.pbi-model-status.loading{color:#E8961A;}
.pbi-model-status.done{color:#27AE60;}
.pbi-model-status.error{color:#C0392B;}
.pbi-mbar{height:2px;background:#F0F0F0;border-radius:99px;margin-top:4px;overflow:hidden;}
.pbi-mbar-fill{height:100%;background:#F5A623;border-radius:99px;transition:width 5s linear;}
.pbi-spin{display:inline-block;animation:pbi-rotate .8s linear infinite;}
@keyframes pbi-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}


/* ─── MEU DIA — TIMELINE WEEK VIEW ─────────────────────────────────────────── */
.meudia-tl-wrap{border-radius:10px;border:2px solid #BFD0DF;background:#fff;overflow:hidden;}
.meudia-tl-header{display:grid;grid-template-columns:48px repeat(6,1fr);border-bottom:2px solid #BFD0DF;}
.meudia-tl-corner{border-right:1px solid #E0EBF5;background:#F7FAFD;}
.meudia-tl-hdr{text-align:center;padding:8px 4px 6px;border-right:2px solid #C8D8EA;cursor:pointer;transition:background .15s;}
.meudia-tl-hdr:hover{background:#F7FAFD;}
.meudia-tl-hdr.today{background:#E8EBFF;border-bottom:2px solid #8393ff;}
.meudia-tl-dow{font-size:10px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.4px;}
.meudia-tl-dnum{font-size:20px;font-weight:800;color:#001a70;line-height:1.2;}
.meudia-tl-dnum.today{color:#fff;background:#8393ff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;}
.meudia-tl-allday{display:grid;grid-template-columns:48px repeat(6,1fr);border-bottom:2px solid #BFD0DF;background:#EEF3F8;}
.meudia-tl-ad-label{font-size:9px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.4px;border-right:1px solid #E0EBF5;display:flex;align-items:center;justify-content:center;padding:4px 2px;}
.meudia-tl-ad-cell{border-right:1px solid #E0EBF5;padding:3px 4px;min-height:28px;display:flex;flex-wrap:wrap;gap:2px;align-items:flex-start;}
.meudia-tl-ad{font-size:10px;font-weight:600;border-radius:3px;padding:1px 6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;max-width:100%;}
.meudia-tl-ad.outlook{background:#EAF4FF;color:#001a70;}
.meudia-tl-ad.personal{background:#f0f2ff;color:#001a70;}
.meudia-tl-ad.done{background:#EDFAF3;color:#27AE60;text-decoration:line-through;}
.meudia-tl-addday{background:none;border:none;color:#C5D8E8;font-size:14px;line-height:1;cursor:pointer;padding:0 2px;margin-left:auto;}
.meudia-tl-addday:hover{color:#8393ff;}
.meudia-tl-body{display:flex;overflow-y:visible;}
.meudia-tl-timecol{width:48px;flex-shrink:0;position:relative;border-right:2px solid #C8D8EA;background:#F2F6FA;}
.meudia-tl-tlabel{position:absolute;right:6px;font-size:9px;color:#7A9BB5;font-weight:700;transform:translateY(-50%);white-space:nowrap;pointer-events:none;}
.meudia-tl-daysarea{flex:1;display:grid;grid-template-columns:repeat(6,1fr);position:relative;overflow:hidden;}
.meudia-tl-dcol{position:relative;border-right:2px solid #C8D8EA;}
.meudia-tl-dcol.today{background:rgba(131,147,255,0.09);}
.meudia-tl-hline{position:absolute;left:0;right:0;height:1px;background:#BFD0DF;pointer-events:none;}
.meudia-tl-hline.half{background:#DDE8F0;}
.meudia-tl-ev{position:absolute;left:3px;right:3px;border-radius:4px;padding:2px 5px;overflow:hidden;cursor:pointer;border-left:3px solid;z-index:2;transition:opacity .15s;}
.meudia-tl-ev:hover{opacity:.85;}
.meudia-tl-ev.outlook{background:#EAF4FF;border-left-color:#001a70;}
.meudia-tl-ev.personal{background:#f0f2ff;border-left-color:#8393ff;}
.meudia-tl-ev.done{background:#EDFAF3;border-left-color:#27AE60;}
.meudia-tl-ev-time{font-size:9px;color:#7A9BB5;font-weight:700;white-space:nowrap;overflow:hidden;}
.meudia-tl-ev-title{font-size:10px;font-weight:700;color:#001a70;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.meudia-tl-ev.done .meudia-tl-ev-title{color:#27AE60;text-decoration:line-through;}
.meudia-tl-nowline{position:absolute;left:0;right:0;height:2px;background:#E53935;z-index:10;pointer-events:none;}
.meudia-tl-nowline::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;background:#E53935;border-radius:50%;}



.meudia-drag-over{background:rgba(131,147,255,0.13)!important;outline:2px dashed #8393ff;outline-offset:-2px;}
.meudia-tl-ev.personal{cursor:grab;}
.meudia-tl-ev.personal:active{cursor:grabbing;opacity:.7;}
.meudia-event.personal{cursor:grab;}
.meudia-event.personal:active{cursor:grabbing;opacity:.7;}
.meudia-tl-ad.personal{cursor:grab;}

/* ─── ATTENTION PANEL ─── */
.meudia-outer{display:flex;gap:0;align-items:stretch;min-height:0;}
.meudia-main{flex:1;min-width:0;overflow:auto;}
.meudia-attention{width:22%;flex-shrink:0;border-left:2px solid #C8D8EA;display:flex;flex-direction:column;background:#fff;max-height:calc(100vh - 120px);overflow:hidden;}

function buildInitialTasks() {
  const all = [];
  IMPORTED_DATA.forEach((p,pi) => {
    if(!p.tasks.length) {
      all.push({id:"p"+pi+"_main",title:p.project,description:"",priority:p.priority,status:p.status,startDate:p.startDate,endDate:p.endDate,project:p.project,done:p.doneTasks>0});
    } else {
      p.tasks.forEach((t,ti) => {
        all.push({id:"p"+pi+"_t"+ti,title:t,description:"",priority:p.priority,status:ti<p.doneTasks?"Concluído":p.status,startDate:p.startDate,endDate:p.endDate,project:p.project,done:ti<p.doneTasks});
      });
    }
  });
  return all;
}

let INV_LIVE = null;
function loadState() {
  try {
    const t = localStorage.getItem("fluidra_tasks_v2");
    S.tasks = t ? JSON.parse(t) : buildInitialTasks();
    const a = localStorage.getItem("fluidra_atas_v1");
    S.atas = a ? JSON.parse(a) : [];
  } catch(e) {
    S.tasks = buildInitialTasks();
    S.atas = [];
  }
  const _invSaved = localStorage.getItem('fluidra_inv_live_v1');
  if (_invSaved) { try { INV_LIVE = JSON.parse(_invSaved); } catch(e) { INV_LIVE = null; } }
  // ─ Migrate: add EM USO column if missing from old INV_LIVE data ─
  if (INV_LIVE && INV_LIVE.workstations) {
    if (!INV_LIVE.workstations.columns.includes('EM USO'))
      INV_LIVE.workstations.columns.splice(1, 0, 'EM USO');
    INV_LIVE.workstations.rows.forEach((row, i) => {
      if (!('EM USO' in row) || row['EM USO'] === null) {
        // Copy from updated INVENTORY_DATA defaults
        row['EM USO'] = (INVENTORY_DATA.workstations.rows[i] || {})['EM USO'] || null;
      }
    });
  }
  const _eo = localStorage.getItem('fluidra_exec_order_v1');
  if(_eo){ try{ S.execProjectOrder=JSON.parse(_eo); }catch(e){} }
  const _up = localStorage.getItem('fluidra_userperm_v1');
  if (_up) { try { S.userPermissions = JSON.parse(_up); } catch(e) {} }
  const _disc = localStorage.getItem('fluidra_discovery_v1');
  if(_disc){ try{ S.discovery=JSON.parse(_disc); }catch(e){} }
  const _md = localStorage.getItem('fluidra_meudia_v1');
  if(_md){ try{ S.meudiaItems=JSON.parse(_md); }catch(e){} }
  S.loaded = true;
}
function persist() {
  if(!S.loaded) return;
  localStorage.setItem("fluidra_tasks_v2", JSON.stringify(S.tasks));
  localStorage.setItem("fluidra_atas_v1", JSON.stringify(S.atas));
  if(S.execProjectOrder.length) localStorage.setItem("fluidra_exec_order_v1", JSON.stringify(S.execProjectOrder));
  localStorage.setItem('fluidra_discovery_v1', JSON.stringify(S.discovery));
  localStorage.setItem('fluidra_meudia_v1', JSON.stringify(S.meudiaItems));
  syncToSharePoint();

function serializeAll() {
  return {
    tasks: S.tasks,
    atas: S.atas,
    execProjectOrder: S.execProjectOrder,
    discovery: S.discovery,
    invLive: INV_LIVE,
    compras: loadCompras(),
    meudiaItems: S.meudiaItems,
    userPermissions: S.userPermissions
  };
}

async function syncToSharePoint() {
  try {
    await fetch(WRITE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(serializeAll())
    });
  } catch(e) {
    console.warn('[GTI] Falha ao sincronizar com SharePoint:', e);
  }
}

async function loadFromSharePoint() {
  try {
    const resp = await fetch(READ_URL, { method: 'POST' });
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.tasks) { S.tasks = data.tasks; localStorage.setItem('fluidra_tasks_v2', JSON.stringify(data.tasks)); }
    if (data.atas) { S.atas = data.atas; localStorage.setItem('fluidra_atas_v1', JSON.stringify(data.atas)); }
    if (data.execProjectOrder) { S.execProjectOrder = data.execProjectOrder; localStorage.setItem('fluidra_exec_order_v1', JSON.stringify(data.execProjectOrder)); }
    if (data.discovery) { S.discovery = data.discovery; localStorage.setItem('fluidra_discovery_v1', JSON.stringify(data.discovery)); }
    if (data.invLive) { INV_LIVE = data.invLive; localStorage.setItem('fluidra_inv_live_v1', JSON.stringify(data.invLive)); }
    if (data.compras) { saveCompras(data.compras, true); }
    if (data.meudiaItems) { S.meudiaItems = data.meudiaItems; localStorage.setItem('fluidra_meudia_v1', JSON.stringify(data.meudiaItems)); }
    if (data.userPermissions) { S.userPermissions = data.userPermissions; localStorage.setItem('fluidra_userperm_v1', JSON.stringify(data.userPermissions)); }
    // Auto-register current user if not yet in permissions
    if (CURRENT_USER && !S.userPermissions[CURRENT_USER.email]) {
      S.userPermissions[CURRENT_USER.email] = defaultUserPerm(CURRENT_USER.name);
      syncToSharePoint();
    }
    render();
  } catch(e) {
    console.warn('[GTI] Falha ao carregar dados do SharePoint:', e);
  }
}

async function checkAuth() {
  try {
    const resp = await fetch('/.auth/me');
    if (!resp.ok) return null;
    const data = await resp.json();
    const cp = data.clientPrincipal;
    if (!cp) return null;
    // userDetails is the email for AAD
    const email = cp.userDetails || '';
    // Try to get a friendly name from claims
    let name = email;
    if (cp.claims) {
      const nameClaim = cp.claims.find(function(c) {
        return c.typ === 'name' || c.typ === 'http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name';
      });
      if (nameClaim && nameClaim.val) name = nameClaim.val;
    }
    return { email: email, name: name };
  } catch(e) {
    console.warn('[GTI] checkAuth error:', e);
    return null;
  }
}

function fmt(d) { return d ? d.split("-").reverse().join("/") : ""; }
function fmtShort(d) { if(!d) return ""; const dt = new Date(d+"T12:00:00"); return dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}); }
function fmtMonth(m) { return m.toLocaleDateString("pt-BR",{month:"short"}).replace(".",""); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getProjectStatus(tasks) {
  if(!tasks.length) return "Backlog";
  if(tasks.every(t=>t.status==="Backlog"))   return "Backlog";
  if(tasks.every(t=>t.status==="Stand-By"))  return "Stand-By";
  if(tasks.every(t=>t.status==="Concluído")) return "Concluído";
  return "Em Andamento";
}
function getFiltered() {
  return S.tasks.filter(t =>
    (S.filterProject==="Todos" || t.project===S.filterProject) &&
    (S.filterPriority==="Todas" || t.priority===S.filterPriority)
  );
}
function getProjectGroups(tasks) {
  const names = [...new Set(tasks.map(t=>t.project||"Sem projeto"))];
  return names.map(n=>({name:n, tasks:tasks.filter(t=>(t.project||"Sem projeto")===n)}));
}
function badgeHtml(text, colors) {
  return `<span class="badge" style="background:${colors.bg};color:${colors.text};">${esc(text)}</span>`;
}

function render() {
  try {
    const app = document.getElementById("app");
    if(S.page==="home") {
      app.innerHTML = renderHome();
      setTimeout(refreshComprasStat, 0);
    } else if(S.ataProject !== null) {
      app.innerHTML = renderAtaPage();
    } else if(S.page==="inventory") {
      app.innerHTML = renderInventory();
    } else if(S.page==="compras") {
      app.innerHTML = renderCompras();
    } else if(S.page==="discovery") {
      app.innerHTML = renderDiscovery();
    } else if(S.page==="meudia") {
      app.innerHTML = renderMeuDia();
    } else if(S.page==="useradmin") {
      app.innerHTML = renderUserAdmin();
    } else {
      app.innerHTML = renderMain();
    }
    attachEvents();
  } catch(err) {
    document.getElementById("app").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#C0392B;">'
      + '<h2>Erro ao renderizar</h2>'
      + '<pre style="background:#FDE8E8;padding:16px;border-radius:8px;white-space:pre-wrap;">'
      + (err && err.stack ? err.stack : String(err))
      + '</pre>'
      + '<p style="color:#555;">Abra o console do navegador (F12) para mais detalhes.</p>'
      + '</div>';
    console.error('render() error:', err);
  }
}

function renderToolbar(filtered) {
  const total = filtered.length;
  const done = filtered.filter(t=>t.done||t.status==="Concluído").length;
  const pct = total ? Math.round((done/total)*100) : 0;
  const projectList = ["Todos",...new Set(S.tasks.map(t=>t.project).filter(Boolean))];
  const projOpts = projectList.map(p=>`<option${p===S.filterProject?" selected":""}>${esc(p)}</option>`).join("");
  const priOpts = ["Todas",...PRIORITIES].map(p=>`<option${p===S.filterPriority?" selected":""}>${esc(p)}</option>`).join("");
  const views = [{key:"kanban",label:"⊞ Por Tarefa"},{key:"project",label:"📁 Por Projeto"},{key:"executive",label:"📊 Visão Executiva"}];
  const viewBtns = views.map(v=>`<button class="view-btn${S.view===v.key?" active":""}" onclick="setView('${v.key}')">${v.label}</button>`).join("");
  return `<div id="toolbar">
    <select class="sel" onchange="setFilterProject(this.value)">${projOpts}</select>
    <select class="sel" onchange="setFilterPriority(this.value)">${priOpts}</select>
    <div class="view-group">${viewBtns}</div>
    <button class="toggle-btn${S.hideDone?" active":""}" onclick="toggleHideDone()">
      ${S.hideDone?"✓ Ocultando concluídos":"Ocultar concluídos"}
    </button>
    <div class="progress-info">
      <span style="font-size:12px;color:#5A7A90;">${done}/${total} concluídas</span>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span style="font-size:12px;font-weight:700;color:#001a70;">${pct}%</span>
    </div>
  </div>`;
}

// ── KANBAN ────────────────────────────────────────────────────────────────────
function renderKanban(filtered) {
  const cols = STATUSES.map(status => {
    const c = SC[status];
    const cards = filtered.filter(t=>t.status===status);
    const cardsHtml = cards.length
      ? cards.map(t=>renderTaskCard(t)).join("")
      : `<div class="kanban-empty" data-status="${status}" style="color:${c.dot};">Sem tarefas</div>`;
    return `<div class="kanban-col">
      <div class="kanban-col-inner" style="background:${c.bg};border-color:${c.border}20;">
        <div class="kanban-col-header" style="border-bottom-color:${c.border};">
          <div class="kanban-col-title" style="color:${c.label};">
            <div class="kanban-dot" style="background:${c.dot};"></div>${esc(status)}
          </div>
          <span class="kanban-count" style="color:${c.label};background:${c.border}18;">${cards.length}</span>
        </div>
        <div class="kanban-cards" data-drop-status="${status}"
          ondragover="event.preventDefault();highlightDrop(this,true)"
          ondragleave="highlightDrop(this,false)"
          ondrop="handleDrop(event,'${status}')">
          ${cardsHtml}
        </div>
      </div>
    </div>`;
  });
  return `<div class="kanban-wrap">${cols.join("")}</div>`;
}

function renderTaskCard(task, showProgress=false) {
  const c = SC[task.status]||SC["Backlog"];
  const pc = PC[task.priority]||PC["Média"];
  const projColor = (()=>{
    const name = task.project||'';
    let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffffffff;
    const PROJ_COLORS=[
      {bg:'#E8EFF8',text:'#1a3a6b'},{bg:'#E8F4ED',text:'#1a5e35'},
      {bg:'#FFF3E0',text:'#7a4400'},{bg:'#F3E8FB',text:'#5a1a8a'},
      {bg:'#E0F4FF',text:'#005a8a'},{bg:'#FFF0F0',text:'#8a1a1a'},
      {bg:'#F0FFF4',text:'#145a32'},{bg:'#FFF8E1',text:'#6d4c00'},
    ];
    return PROJ_COLORS[Math.abs(h)%PROJ_COLORS.length];
  })();
  return `<div class="task-card${task.done?" done":""}"
    style="border-left-color:${c.border};"
    draggable="true" data-task-id="${task.id}"
    ondragstart="startDrag(event,'${task.id}')">
    ${task.project?`<div style="margin-bottom:6px;"><span style="display:inline-block;max-width:100%;background:${projColor.bg};color:${projColor.text};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;">📁 ${esc(task.project)}</span></div>`:''}
    <div class="task-card-top">
      <div class="task-card-left">
        <input type="checkbox" ${task.done?"checked":""} onchange="toggleDone('${task.id}')" style="margin-top:2px;accent-color:#8393ff;cursor:pointer;flex-shrink:0;">
        <span class="task-card-title${task.done?" done":""}">${esc(task.title)}</span>
      </div>
      <div class="task-card-actions">
        <button class="card-btn" onclick="openTaskModal('${task.id}')">✏️</button>
        <button class="card-btn" onclick="deleteTask('${task.id}')">🗑</button>
      </div>
    </div>
    ${showProgress?`<div style="display:flex;align-items:center;gap:10px;margin-top:5px;">
      ${task.description?`<div class="task-card-desc" style="flex:1;margin:0;">${esc(task.description)}</div>`:'<div style="flex:1;"></div>'}
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <input type="range" min="0" max="100" value="${getTaskProgress(task)}"
          oninput="updateTaskProgress('${task.id}',this.value);this.nextElementSibling.textContent=this.value+'%'"
          onclick="event.stopPropagation()"
          style="width:130px;accent-color:#8393ff;cursor:pointer;">
        <span style="font-size:11px;font-weight:700;color:#001a70;min-width:32px;text-align:right;">${getTaskProgress(task)}%</span>
      </div>
    </div>`:task.description?`<div class="task-card-desc">${esc(task.description)}</div>`:""}
    <div class="task-card-meta">
      ${badgeHtml(task.priority,pc)}
      ${task.startDate?`<span style="font-size:11px;color:#7A9BB5;">▶ ${fmt(task.startDate)}</span>`:""}
      ${task.endDate?`<span style="font-size:11px;color:#7A9BB5;">⏹ ${fmt(task.endDate)}</span>`:""}
    </div>
  </div>`;
}

// ── PROJECT VIEW ──────────────────────────────────────────────────────────────
function renderProjectView(filtered) {
  let groups = getProjectGroups(filtered);
  if(S.hideDone) groups = groups.filter(g=>getProjectStatus(g.tasks)!=="Concluído");

  if(S.execProjectOrder.length){groups.sort((a,b)=>{const ai=S.execProjectOrder.indexOf(a.name),bi=S.execProjectOrder.indexOf(b.name);return(ai<0?9999:ai)-(bi<0?9999:bi);});}
  if(!groups.length) return `<div style="text-align:center;color:#B0C8D8;font-size:14px;padding-top:40px;">Nenhum projeto encontrado.</div>`;
  return `<div style="padding-bottom:24px;">${groups.map(g=>renderProjectCard(g)).join("")}</div>`;
}

function renderProjectCard(g) {
  const total = g.tasks.length;
  const done = g.tasks.filter(t=>t.done||t.status==="Concluído").length;
  const pct = getProjectProgress(g.tasks);
  const ps = getProjectStatus(g.tasks);
  const sc = PSC[ps]||PSC["Em Andamento"];
  const highP = g.tasks.filter(t=>t.priority==="Alta").length;
  const earliest = g.tasks.map(t=>t.startDate).filter(Boolean).sort()[0]||"";
  const latest = g.tasks.map(t=>t.endDate).filter(Boolean).sort().reverse()[0]||"";
  const expanded = S.expandedProjects.has(g.name);
  const ataCount = S.atas.filter(a=>a.project===g.name).length;
  const statusCounts = {};
  STATUSES.forEach(s=>{statusCounts[s]=g.tasks.filter(t=>t.status===s).length;});
  const pills = STATUSES.map(s=>{
    const c = SC[s];
    return `<div class="status-pill" style="background:${c.bg};border-color:${c.border}30;">
      <div class="status-pill-dot" style="background:${c.dot};"></div>
      <span class="status-pill-label" style="color:${c.label};">${esc(s)}</span>
      <span class="status-pill-count" style="color:${c.label};background:${c.border}20;">${statusCounts[s]}</span>
    </div>`;
  }).join("");
  const sortedForRender = [...g.tasks].sort((a,b)=>{
    const aEnd = a.endDate||a.startDate||"9999-12-31";
    const bEnd = b.endDate||b.startDate||"9999-12-31";
    if(aEnd !== bEnd) return aEnd.localeCompare(bEnd);
    const aStart = a.startDate||"9999-12-31";
    const bStart = b.startDate||"9999-12-31";
    return aStart.localeCompare(bStart);
  });
  const taskCards = expanded && g.tasks.length ? sortedForRender.map(t=>renderTaskCard(t,true)).join("") : "";
  return `<div class="project-card">
    <div class="project-card-header">
      <div class="proj-icon" style="background:${sc.bg};border:1.5px solid ${sc.border}40;">📁</div>
      <div class="proj-info">
        <div class="proj-name-row">
          <span class="proj-name">${esc(g.name)}</span>
          <span style="background:${sc.bg};color:${sc.label};border:1px solid ${sc.border}40;border-radius:20px;padding:1px 10px;font-size:11px;font-weight:600;">${ps}</span>
          ${highP>0?`<span style="background:#FDE8E8;color:#C0392B;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600;">⚠ ${highP} alta prioridade</span>`:""}
        </div>
        <div class="proj-progress-row">
          <div class="proj-prog-bar"><div class="proj-prog-fill" style="width:${pct}%;background:${pct===100?"#27AE60":"#8393ff"};"></div></div>
          <span style="font-size:12px;font-weight:700;color:#001a70;min-width:34px;">${pct}%</span>
          <span style="font-size:12px;color:#7A9BB5;white-space:nowrap;">${done}/${total} tarefas</span>
        </div>
      </div>
      <div class="proj-dates">
        ${earliest?`<div>▶ ${fmt(earliest)}</div>`:""}
        ${latest?`<div>⏹ ${fmt(latest)}</div>`:""}
      </div>
      <button class="proj-toggle-btn" onclick="toggleProject('${esc(g.name).replace(/'/g,"\\'")}')">
        ${expanded?"▲ Fechar":"▼ Tarefas"}
      </button>
    </div>
    <div class="proj-pills">
      ${pills}
      <button class="ata-btn" onclick="openAta('${esc(g.name).replace(/'/g,"\\'")}')">
        <span>📋</span><span>ATAs</span>
        ${ataCount>0?`<span class="ata-badge">${ataCount}</span>`:""}
      </button>
    </div>
    ${expanded?`<div class="proj-tasks">
      ${sortedForRender.length===0?`<div class="no-tasks">Nenhuma tarefa ainda.</div>`:""}
      ${taskCards}
      <button class="add-task-btn" onclick="openTaskModal(null,'${esc(g.name).replace(/'/g,"\\'")}')">+ Adicionar tarefa</button>
    </div>`:""}
  </div>`;
}

// ── EXECUTIVE / GANTT ─────────────────────────────────────────────────────────
function renderExecutive(filtered) {
  let groups = getProjectGroups(filtered);
  if(S.hideDone) groups = groups.filter(g=>getProjectStatus(g.tasks)!=="Concluído");
  // Apply custom drag order
  if(S.execProjectOrder.length){
    const om=new Map(S.execProjectOrder.map((n,i)=>[n,i]));
    groups.sort((a,b)=>(om.has(a.name)?om.get(a.name):999)-(om.has(b.name)?om.get(b.name):999));
  }
  if(!groups.length) return `<div class="gantt-empty">Nenhum projeto encontrado.</div>`;

  // date-range calculation uses only groups that have both start AND end
  const withDates = groups.filter(g=>{
    const s=g.tasks.map(t=>t.startDate).filter(Boolean).sort()[0];
    const e=g.tasks.map(t=>t.endDate).filter(Boolean).sort().reverse()[0];
    return s&&e;
  });

  // if NO group has dates, fall back to simple list
  if(!withDates.length) {
    return `<div class="gantt-wrap">${renderExecNoDates(groups)}</div>`;
  }

  const allStarts = withDates.map(g=>new Date(g.tasks.map(t=>t.startDate).filter(Boolean).sort()[0]+"T12:00:00"));
  const allEnds   = withDates.map(g=>new Date(g.tasks.map(t=>t.endDate).filter(Boolean).sort().reverse()[0]+"T12:00:00"));
  const gMin = new Date(Math.min(...allStarts));
  const gMax = new Date(Math.max(...allEnds));
  const globalStart = new Date(gMin.getFullYear(), gMin.getMonth(), 1);
  const globalEnd   = new Date(gMax.getFullYear(), gMax.getMonth()+1, 0);
  const globalDays  = Math.max((globalEnd-globalStart)/86400000, 1);

  if(!S.ganttZoomInitialized){
    const _n=new Date();
    const _tp=d=>Math.max(0,Math.min(100,((d-globalStart)/86400000/globalDays)*100));
    S.ganttZoomStart=_tp(new Date(_n.getFullYear(),_n.getMonth()-6,1));
    S.ganttZoomEnd  =_tp(new Date(_n.getFullYear(),_n.getMonth()+7,0));
    S.ganttZoomInitialized=true;
  }

  const zs = S.ganttZoomStart, ze = S.ganttZoomEnd;
  const pctToDate = pct => new Date(globalStart.getTime()+(pct/100)*globalDays*86400000);
  const rangeStart = new Date(pctToDate(zs).getFullYear(), pctToDate(zs).getMonth(), 1);
  const rangeEnd   = new Date(pctToDate(ze).getFullYear(), pctToDate(ze).getMonth()+1, 0);
  const totalDays  = Math.max((rangeEnd-rangeStart)/86400000, 1);

  const months=[];
  let mc = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), 1);
  while(mc<=rangeEnd){ months.push(new Date(mc)); mc=new Date(mc.getFullYear(),mc.getMonth()+1,1); }

  const today = new Date();
  const todayPct = Math.min(100, Math.max(0, ((today-rangeStart)/86400000/totalDays)*100));
  const NAME_COL = 330, MIN_MONTH_PX = 72;
  const timelineW = Math.max(months.length*MIN_MONTH_PX, 600);

  function monthLeftPct(idx) {
    return months.slice(0,idx).reduce((acc,mm)=>{
      const ms=new Date(mm.getFullYear(),mm.getMonth(),1), me=new Date(mm.getFullYear(),mm.getMonth()+1,0);
      return acc+((Math.min(me,rangeEnd)-Math.max(ms,rangeStart))/86400000+1)/totalDays*100;
    },0);
  }
  function monthWidthPct(m) {
    const ms=new Date(m.getFullYear(),m.getMonth(),1), me=new Date(m.getFullYear(),m.getMonth()+1,0);
    return ((Math.min(me,rangeEnd)-Math.max(ms,rangeStart))/86400000+1)/totalDays*100;
  }

  const sliderBars = withDates.map(g=>{
    const sStr=g.tasks.map(t=>t.startDate).filter(Boolean).sort()[0];
    const eStr=g.tasks.map(t=>t.endDate).filter(Boolean).sort().reverse()[0];
    const s=new Date(sStr+"T12:00:00"), e=new Date(eStr+"T12:00:00");
    const lp=Math.max(0,((s-globalStart)/86400000/globalDays)*100);
    const wp=Math.max(0.5,((e-s)/86400000/globalDays)*100);
    const bar=PSC[getProjectStatus(g.tasks)]?.bar||"#7A9BB5";
    return `<div style="position:absolute;left:${lp}%;width:${wp}%;top:4px;height:16px;background:${bar};border-radius:3px;opacity:.4;"></div>`;
  }).join("");

  const now2=new Date();
  function toPct(d){ return Math.max(0,Math.min(100,((d-globalStart)/86400000/globalDays)*100)); }
  const presets=[
    {label:"Tudo",s:0,e:100},
    {label:"2025",s:toPct(new Date(2025,0,1)),e:toPct(new Date(2025,11,31))},
    {label:"2026",s:toPct(new Date(2026,0,1)),e:toPct(new Date(2026,11,31))},
    {label:"6 meses",s:toPct(new Date(now2.getFullYear(),now2.getMonth()-1,1)),e:toPct(new Date(now2.getFullYear(),now2.getMonth()+5,0))},
  ];
  const presetBtns = presets.map(p=>`<button class="gantt-preset-btn" onclick="setGanttZoom(${p.s.toFixed(1)},${p.e.toFixed(1)})">${p.label}</button>`).join("");

  const headerMonths = months.map((m,i)=>{
    const lp=monthLeftPct(i), wp=monthWidthPct(m);
    const isCur=m.getFullYear()===today.getFullYear()&&m.getMonth()===today.getMonth();
    return `<div class="gantt-month${isCur?" current":""}" style="left:${lp}%;width:${wp}%;">
      <span class="gantt-month-name${isCur?" current":""}">${fmtMonth(m)}</span>
      <span class="gantt-month-year${isCur?" current":""}">${m.getFullYear()}</span>
    </div>`;
  }).join("");

  // render ALL groups (with AND without dates)
  const rows = groups.map((g,idx)=>{
    const sStr=g.tasks.map(t=>t.startDate).filter(Boolean).sort()[0];
    const eStr=g.tasks.map(t=>t.endDate).filter(Boolean).sort().reverse()[0];
    const hasDates=!!(sStr&&eStr);
    const total=g.tasks.length, done=g.tasks.filter(t=>t.done||t.status==="Concluído").length;
    const ps=getProjectStatus(g.tasks), sc=PSC[ps]||PSC["Em Andamento"];
    const pct=getProjectProgress(g.tasks);
    const rowClass=idx%2===0?"even":"odd";
    const expanded=S.expandedExecProjects.has(g.name);
    const nameKey=esc(g.name).replace(/'/g,"\\'");

    const monthBgs=months.map((m,i)=>{
      const lp=monthLeftPct(i),wp=monthWidthPct(m);
      const isCur=m.getFullYear()===today.getFullYear()&&m.getMonth()===today.getMonth();
      const even=idx%2===0;
      return `<div style="position:absolute;left:${lp}%;width:${wp}%;top:0;bottom:0;background:${isCur?"rgba(131,147,255,0.03)":even?"rgba(0,40,90,0.018)":"transparent"};border-right:1px solid #DDE8F2;"></div>`;
    }).join("");

    let barHtml="";
    if(hasDates){
      const start=new Date(sStr+"T12:00:00"), end=new Date(eStr+"T12:00:00");
      const visStart=start<rangeStart?rangeStart:start;
      const visEnd=end>rangeEnd?rangeEnd:end;
      const outOfRange=end<rangeStart||start>rangeEnd;
      const leftPct=((visStart-rangeStart)/86400000/totalDays)*100;
      const widthPct=Math.max(0.4,((visEnd-visStart)/86400000/totalDays)*100);
      barHtml=!outOfRange?`<div class="gantt-row-bar" style="left:${leftPct}%;width:${widthPct}%;background:${sc.bar};opacity:${ps==="Concluído"?0.6:1};" title="${fmtShort(sStr)} → ${fmtShort(eStr)}">
          <div class="gantt-bar-progress" style="width:${pct}%;"></div>
          <div class="gantt-bar-label"><span class="gantt-bar-text">${fmtShort(sStr)} → ${fmtShort(eStr)}</span></div>
        </div>`:"";
    } else {
      barHtml=`<div style="position:absolute;left:50%;transform:translateX(-50%);font-size:10px;color:#B0C8D8;top:50%;transform:translate(-50%,-50%);">sem datas</div>`;
    }

    const sortedTasks=[...g.tasks].sort((a,b)=>(a.startDate||a.endDate||"9999").localeCompare(b.startDate||b.endDate||"9999"));
    const taskSubRows=expanded?sortedTasks.map(t=>{
      const tc=SC[t.status]||SC["Backlog"];
      const pc=PC[t.priority]||PC["Média"];
      return `<div style="display:flex;align-items:center;background:#fafafa;border-bottom:1px solid #f0eee8;">
        <div style="width:${NAME_COL}px;min-width:${NAME_COL}px;padding:6px 10px 6px 28px;display:flex;align-items:center;gap:6px;border-right:1px solid #e8eef5;overflow:hidden;">
          <div style="width:6px;height:6px;border-radius:50%;background:${tc.dot};flex-shrink:0;"></div>
          <span style="font-size:11px;color:#1a1a3e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(t.title||"")}">${esc(t.title||"")}</span>
        </div>
        <div style="flex:1;width:${timelineW}px;padding:5px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="background:${tc.bg};color:${tc.label};border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;">${t.status}</span>
          <span style="background:${pc.bg};color:${pc.text};border-radius:4px;padding:1px 7px;font-size:10px;font-weight:600;">${t.priority}</span>
          <span style="font-size:10px;color:#7A9BB5;">${t.startDate?fmt(t.startDate):""} ${t.startDate&&t.endDate?"→":""} ${t.endDate?fmt(t.endDate):""}</span>
        </div>
      </div>`;
    }).join(""):"";

    return `<div>
      <div class="gantt-row ${rowClass}" draggable="true" data-gname="${esc(g.name)}" ondragstart="execDragStart(event,this)" ondragend="execDragEnd(event,this)" ondragover="execDragOver(event,this)" ondragleave="execDragLeave(this)" ondrop="execDrop(event,this)" style="cursor:grab;">
        <div class="gantt-row-name" style="width:${NAME_COL}px;min-width:${NAME_COL}px;border-right:3px solid ${sc.bar};">
          <div class="gantt-row-name-inner">
            <span style="color:#B0C8D8;font-size:13px;margin-right:2px;cursor:grab;user-select:none;" title="Arrastar para reordenar">⠿</span>
            <div class="gantt-row-dot" style="background:${sc.bar};"></div>
            <span class="gantt-row-label">${esc(g.name)}</span>
          </div>
          <div class="gantt-row-progress">
            <button onclick="toggleExecProject('${nameKey}')" style="background:none;border:1px solid #dddce8;border-radius:4px;padding:0 5px;font-size:10px;cursor:pointer;color:#7A9BB5;line-height:1.6;">${expanded?"▲":"▼"}</button>
            <span style="font-size:11px;color:#7A9BB5;font-weight:600;min-width:28px;">${done}/${total}</span>
            <div class="gantt-row-prog-bar"><div class="gantt-row-prog-fill" style="width:${pct}%;background:${sc.bar};"></div></div>
            <span style="font-size:10px;color:${sc.label};font-weight:700;">${pct}%</span>
          </div>
        </div>
        <div class="gantt-timeline-row" style="width:${timelineW}px;position:relative;">
          ${monthBgs}
          ${today>=rangeStart&&today<=rangeEnd?`<div class="gantt-today-line" style="left:${todayPct}%;"></div>`:""}
          ${barHtml}
        </div>
      </div>
      ${taskSubRows}
    </div>`;
  }).join("");

  const fmtPeriod = d => d.toLocaleDateString("pt-BR",{month:"short",year:"numeric"});

  return `<div class="gantt-wrap">
    <div class="gantt-zoom-box">
      <div class="gantt-zoom-header">
        <span style="font-size:12px;font-weight:700;color:#001a70;">🔍 Período visualizado</span>
        <div class="gantt-presets">${presetBtns}</div>
      </div>
      <div class="gantt-slider-track" id="gantt-slider">
        ${sliderBars}
        <div class="gantt-range-fill" id="gantt-fill" style="left:${zs}%;width:${ze-zs}%;"></div>
        <div class="gantt-handle" id="gantt-handle-start" style="left:${zs}%;"><span>◀▶</span></div>
        <div class="gantt-handle" id="gantt-handle-end" style="left:${ze}%;"><span>◀▶</span></div>
      </div>
      <div class="gantt-label-row">
        <span class="gantt-period-label">${fmtPeriod(rangeStart)}</span>
        <span class="gantt-period-label">${fmtPeriod(rangeEnd)}</span>
      </div>
    </div>
    <div class="gantt-table">
      <div class="gantt-table-scroll">
        <div style="min-width:${NAME_COL+timelineW}px;">
          <div class="gantt-header-row">
            <div class="gantt-name-col" style="width:${NAME_COL}px;min-width:${NAME_COL}px;">
              <span>Projeto</span>
            </div>
            <div class="gantt-timeline-header" style="width:${timelineW}px;height:44px;position:relative;">
              ${headerMonths}
            </div>
          </div>
          ${rows}
          <div class="gantt-footer">
            <div class="gantt-legend-item"><div class="gantt-legend-line" style="background:#F5A623;"></div><span>Hoje (${today.toLocaleDateString("pt-BR")})</span></div>
            ${Object.entries(PSC).map(([s,c])=>`<div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:${c.bar};"></div><span>${s}</span></div>`).join("")}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderExecNoDates(noDates) {
  if(!noDates.length) return "";
  return `<div class="gantt-no-dates">
    <div class="gantt-no-dates-title">Sem datas definidas</div>
    <div class="gantt-no-dates-items">
      ${noDates.map(g=>{
        const total=g.tasks.length,done=g.tasks.filter(t=>t.done||t.status==="Concluído").length;
        const ps=getProjectStatus(g.tasks),sc=PSC[ps]||PSC["Em Andamento"];
        return `<div class="gantt-nodates-card" style="border-color:${sc.border}40;">
          <div style="width:8px;height:8px;border-radius:50%;background:${sc.bar};"></div>
          <span style="font-size:13px;font-weight:600;color:#001a70;">${esc(g.name)}</span>
          <span style="font-size:12px;color:#7A9BB5;background:#F0F5FA;border-radius:4px;padding:1px 8px;">${done}/${total}</span>
          <span style="font-size:11px;color:${sc.label};background:${sc.bg};border-radius:10px;padding:1px 8px;font-weight:600;">${ps}</span>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function renderAdminProjects() {
  let groups = getProjectGroups(S.tasks);
  if(S.hideDone) groups = groups.filter(g=>getProjectStatus(g.tasks)!=="Concluído");

  if(S.execProjectOrder.length){groups.sort((a,b)=>{const ai=S.execProjectOrder.indexOf(a.name),bi=S.execProjectOrder.indexOf(b.name);return(ai<0?9999:ai)-(bi<0?9999:bi);});}
  if(!groups.length) return `<div style="text-align:center;color:#B0C8D8;font-size:14px;padding:40px;">Nenhum projeto encontrado.</div>`;

  const rows = groups.map((g,gi)=>{
    const ps=getProjectStatus(g.tasks), sc=PSC[ps]||PSC["Em Andamento"];
    const done=g.tasks.filter(t=>t.done||t.status==="Concluído").length;
    const expanded=S.adminExpandedProjects.has(g.name);
    const nameKey=esc(g.name).replace(/'/g,"\\'");

    const sortedTasks=[...g.tasks].sort((a,b)=>{
      const aEnd=a.endDate||a.startDate||"9999-12-31", bEnd=b.endDate||b.startDate||"9999-12-31";
      if(aEnd!==bEnd) return aEnd.localeCompare(bEnd);
      return (a.startDate||"9999-12-31").localeCompare(b.startDate||"9999-12-31");
    });
    const taskRows=expanded?sortedTasks.map(t=>{
      const statusOpts=STATUSES.map(s=>`<option value="${s}"${t.status===s?" selected":""}>${s}</option>`).join("");
      const priorOpts=PRIORITIES.map(p=>`<option value="${p}"${t.priority===p?" selected":""}>${p}</option>`).join("");
      const tc=SC[t.status]||SC["Backlog"];
      return `<tr style="border-bottom:1px solid #f0eee8;background:#fff;">
        <td style="padding:7px 14px 7px 36px;font-size:12px;color:#1a1a3e;min-width:200px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <div style="width:6px;height:6px;border-radius:50%;background:${tc.dot};flex-shrink:0;"></div>
            <input type="text" value="${esc(t.title||'')}"
              oninput="adminUpdateTask('${t.id}','title',this.value)"
              onclick="event.stopPropagation()"
              style="border:1px solid #dddce8;border-radius:5px;padding:3px 8px;font-size:12px;color:#001a70;width:100%;min-width:180px;font-family:inherit;background:#fafbff;">
          </div>
        </td>
        <td style="padding:5px 10px;">
          <select onchange="adminUpdateTask('${t.id}','status',this.value)" style="border:1px solid #dddce8;border-radius:5px;padding:3px 6px;font-size:11px;background:#fff;cursor:pointer;color:#001a70;">
            ${statusOpts}
          </select>
        </td>
        <td style="padding:5px 10px;">
          <select onchange="adminUpdateTask('${t.id}','priority',this.value)" style="border:1px solid #dddce8;border-radius:5px;padding:3px 6px;font-size:11px;background:#fff;cursor:pointer;color:#001a70;">
            ${priorOpts}
          </select>
        </td>
        <td style="padding:5px 10px;">
          <input type="date" value="${t.startDate||""}" onchange="adminUpdateTask('${t.id}','startDate',this.value)"
            style="border:1px solid #dddce8;border-radius:5px;padding:3px 6px;font-size:11px;color:#001a70;cursor:pointer;">
        </td>
        <td style="padding:5px 10px;">
          <input type="date" value="${t.endDate||""}" onchange="adminUpdateTask('${t.id}','endDate',this.value)"
            style="border:1px solid #dddce8;border-radius:5px;padding:3px 6px;font-size:11px;color:#001a70;cursor:pointer;">
        </td>
        <td style="padding:5px 8px;text-align:center;">
          <button onclick="removeTask('${t.id}');event.stopPropagation()" title="Remover tarefa"
            style="background:none;border:none;cursor:pointer;font-size:15px;color:#C0392B;padding:2px 5px;border-radius:4px;">🗑</button>
        </td>
      </tr>`;
    }).join(""):"";

    return `<tr onclick="toggleAdminProject('${nameKey}')" style="cursor:pointer;background:${sc.bg};border-bottom:2px solid ${sc.border}30;">
      <td colspan="6" style="padding:10px 16px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:13px;color:#7A9BB5;font-weight:700;">${expanded?"▼":"▶"}</span>
          <input type="text" value="${esc(g.name)}"
            onchange="renameProject('${nameKey}',this.value)"
            onclick="event.stopPropagation()"
            style="border:1px solid #8393ff66;border-radius:5px;padding:3px 10px;font-size:13px;font-weight:700;color:#001a70;font-family:inherit;background:rgba(255,255,255,.7);min-width:220px;" >
          <span style="background:${sc.bg};color:${sc.label};border:1px solid ${sc.border}40;border-radius:12px;padding:1px 9px;font-size:11px;font-weight:600;">${ps}</span>
          <span style="font-size:11px;color:#7A9BB5;">${done}/${g.tasks.length} tarefas concluídas</span>
        </div>
      </td>
    </tr>
    ${taskRows}
    ${expanded?`<tr><td colspan="6" style="padding:6px 16px 10px 36px;background:#f8f9ff;"><button data-proj="${esc(g.name)}" onclick="addTaskToProject(this.dataset.proj)" style="background:none;border:1.5px dashed #8393ff;color:#001a70;border-radius:6px;padding:5px 16px;font-size:12px;font-weight:600;cursor:pointer;">＋ Adicionar tarefa</button></td></tr>`:''}`;
  }).join("");

  return `<div style="padding:20px 24px 40px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <span style="font-size:15px;font-weight:800;color:#001a70;">⚙ Administração de Projetos</span>
      <span style="font-size:12px;color:#7A9BB5;">Clique em um projeto para expandir e editar tarefas. Alterações salvas automaticamente.</span>
    </div>
    <div style="background:#fff;border-radius:10px;border:1.5px solid #dddce8;overflow:hidden;box-shadow:0 2px 10px rgba(0,26,112,.07);">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#001a70;">
            <th style="padding:10px 16px;text-align:left;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;">Tarefa</th>
            <th style="padding:10px 16px;text-align:left;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;">Status</th>
            <th style="padding:10px 16px;text-align:left;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;">Prioridade</th>
            <th style="padding:10px 16px;text-align:left;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;">Início</th>
            <th style="padding:10px 16px;text-align:left;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;">Término</th>
            <th style="padding:10px 16px;width:44px;"></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function toggleExecProject(name){S.expandedExecProjects.has(name)?S.expandedExecProjects.delete(name):S.expandedExecProjects.add(name);render();}
function toggleAdminProject(name){S.adminExpandedProjects.has(name)?S.adminExpandedProjects.delete(name):S.adminExpandedProjects.add(name);render();}
function getTaskProgress(t){
  if(t.progress!=null) return t.progress;
  return (t.status==="Concluído"||t.done)?100:0;
}
function getProjectProgress(tasks){
  if(!tasks.length) return 0;
  return Math.round(tasks.reduce((s,t)=>s+getTaskProgress(t),0)/tasks.length);
}
function updateTaskProgress(taskId,val){
  const t=S.tasks.find(x=>x.id===taskId); if(!t) return;
  t.progress=parseInt(val);
  if(t.progress===100){ t.status="Concluído"; t.done=true; }
  else if(t.progress<100 && t.status==="Concluído"){ t.status="Em Andamento"; t.done=false; }
  persist(); render();
}
function adminUpdateTask(id,field,value){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  t[field]=value;
  if(field==="status"){ t.done=(value==="Concluído"); if(value==="Concluído") t.progress=100; }
  persist();
}
function renameProject(oldName, newName){
  newName=(newName||'').trim();
  if(!newName||newName===oldName) return;
  S.tasks.forEach(t=>{ if(t.project===oldName) t.project=newName; });
  if(S.adminExpandedProjects.has(oldName)){
    S.adminExpandedProjects.delete(oldName);
    S.adminExpandedProjects.add(newName);
  }
  persist(); render();
}
function addTaskToProject(projName){
  if(!projName) return;
  const id=Date.now()+'_adm';
  S.tasks.push({id,title:'Nova Tarefa',description:'',priority:'Média',status:'Backlog',startDate:'',endDate:'',project:projName,done:false});
  S.adminExpandedProjects.add(projName);
  persist(); render();
}
function removeTask(taskId){
  S.tasks=S.tasks.filter(t=>String(t.id)!==String(taskId));
  persist(); render();
}

    const isExpanded = S.expandedAtas.has(ata.id);

    const dayStr = dt ? String(dt.getDate()).padStart(2,"0") : "";
    const monStr = dt ? dt.toLocaleDateString("pt-BR",{month:"short"}).replace(".","").toUpperCase()+" "+dt.getFullYear() : "";

      <div class="ata-item-header">
        <div class="ata-date-box ${isFirst?"first":"other"}">
          <div class="ata-date-day ${isFirst?"first":"other"}">${dayStr}</div>

            ${isFirst?`<span class="ata-newest-badge">Mais recente</span>`:""}
            <span class="ata-title">${esc(ata.title)}</span>
          </div>
          ${ata.attendees?`<div class="ata-attendees"><span>👥</span><span>${esc(ata.attendees)}</span></div>`:""}
        </div>
        <div class="ata-item-btns">
          <button class="ata-edit-btn" onclick="editAta('${ata.id}')">Editar</button>
          <button class="ata-del-btn" onclick="deleteAta('${ata.id}')">Excluir</button>
          <button class="ata-toggle-btn" style="background:${isExpanded?"#001a70":"#F0F5FA"};color:${isExpanded?"#fff":"#001a70"};" onclick="toggleAta('${ata.id}')">
            ${isExpanded?"▲ Fechar":"▼ Ver"}
          </button>
        </div>
      </div>
      ${isExpanded&&ata.body?`<div class="ata-body"><div class="ata-body-text">${esc(ata.body)}</div></div>`:""}
      ${isExpanded&&!ata.body?`<div class="ata-body-empty">Nenhum conteúdo registrado.</div>`:""}
    </div>`;
  }).join("");

  return header + `<div class="ata-wrap">${formHtml}${listHtml}</div>`;
}

// ── HOME PAGE ─────────────────────────────────────────────────────────────────
function renderHome() {
  const totalProj = new Set(S.tasks.map(t=>t.project).filter(Boolean)).size;
  const activePro = S.tasks.filter(t=>t.status==="Em Andamento").length;
  const today = new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const cap = s => s.charAt(0).toUpperCase()+s.slice(1);

  const tools = [
    {
      id:"projects",
      icon:"📁",
      banner:"linear-gradient(135deg,#001a70 0%,#2a3db0 100%)",
      title:"Gestão de Projetos",
      desc:"Acompanhe projetos de TI, tarefas, prazos e ATAs de reunião em visões kanban, por projeto e executiva (Gantt).",
      stats:`${totalProj} projetos · ${activePro} tarefas ativas`,
      action:()=>"goProjects()",
      actionLabel:"Acessar →",
      soon:false,
    },
    // Placeholder slots — will be replaced by real modules later
    {id:"inventory",icon:"📋",banner:"linear-gradient(135deg,#001a70 0%,#121232 100%)",title:"Inventário Corporativo",desc:"Ativos de TI: workstations, mobile, servidores, impressoras, infraestrutura e acessos.",stats:`294+ ativos cadastrados`,action:()=>"goInventory()",actionLabel:"Acessar →",soon:false},
    {id:"compras",icon:"🛒",banner:"linear-gradient(135deg,#001a70 0%,#1a2f8a 100%)",title:"Compras T.I.",desc:"Gestão de compras de equipamentos — da necessidade à NF lançada no ERP.",stats:`<span id=\"comp-stat\">carregando...</span>`,action:()=>"goCompras()",actionLabel:"Acessar →",soon:false},
    {id:"meudia",icon:"📅",banner:"linear-gradient(135deg,#5b6fd8 0%,#001a70 100%)",title:"Meu Dia",
      desc:"Organize seu dia, semana e mês. Acompanhe reuniões do Outlook e adicione atividades vinculadas a projetos.",
      stats:`${(()=>{const t=new Date().toISOString().split('T')[0];return S.meudiaItems.filter(x=>x.date===t&&!x.done).length})()} atividade(s) hoje`,
      action:()=>"goMeuDia()",actionLabel:"Acessar →",soon:false},
  ];

  const visibleTools = tools.filter(function(t){ return canAccessModule(t.id); });
  const cards = visibleTools.map(t=>`
    <div class="tool-card">
      <div class="tool-card-banner" style="background:${t.banner};">${t.soon?`<span style="font-size:28px;opacity:.3;">${t.icon}</span>`:`<span>${t.icon}</span>`}</div>
      <div class="tool-card-body">
        <div class="tool-card-title" style="${t.soon?"color:#B0C8D8;":""}">${t.title}</div>
        <div class="tool-card-desc">${t.desc}</div>
        <div class="tool-card-footer">
          <span class="tool-card-stats">${t.stats}</span>
          ${t.soon
            ? `<span class="tool-card-soon">Em breve</span>`
            : `<button class="tool-card-btn" onclick="${t.action()}">${t.actionLabel}</button>`
          }
        </div>
      </div>
    </div>`).join("");

function attachGanttSlider() {
  const slider = document.getElementById("gantt-slider");
  const fill   = document.getElementById("gantt-fill");
  const hStart = document.getElementById("gantt-handle-start");
  const hEnd   = document.getElementById("gantt-handle-end");
  if(!slider) return;
  let dragging = null;
  let startX, startZS, startZE;

  function onDown(e, handle) {
    e.preventDefault();
    dragging = handle;
    startX = e.clientX;
    startZS = S.ganttZoomStart;
    startZE = S.ganttZoomEnd;
  }
  function onMove(e) {
    if(!dragging) return;
    const rect = slider.getBoundingClientRect();
    const delta = ((e.clientX-startX)/rect.width)*100;
    if(dragging==="start") {
      S.ganttZoomStart = Math.max(0, Math.min(startZS+delta, S.ganttZoomEnd-5));
    } else if(dragging==="end") {
      S.ganttZoomEnd = Math.min(100, Math.max(startZE+delta, S.ganttZoomStart+5));
    } else {
      const ns = Math.max(0, startZS+delta), ne = Math.min(100, startZE+delta);
      if(ne-ns>=5){ S.ganttZoomStart=ns; S.ganttZoomEnd=ne; }
    }
    // update DOM directly (avoid full re-render)
    hStart.style.left = S.ganttZoomStart+"%";
    hEnd.style.left   = S.ganttZoomEnd+"%";
    fill.style.left   = S.ganttZoomStart+"%";
    fill.style.width  = (S.ganttZoomEnd-S.ganttZoomStart)+"%";
  }
  function onUp() {
    if(!dragging) return;
    dragging = null;
    render(); // re-render with new zoom
  }
  if(hStart) hStart.addEventListener("mousedown", e=>onDown(e,"start"));
  if(hEnd)   hEnd.addEventListener("mousedown",   e=>onDown(e,"end"));
  if(fill)   fill.addEventListener("mousedown",   e=>onDown(e,"range"));
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup",   onUp);
}
