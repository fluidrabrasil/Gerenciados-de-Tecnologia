let _execDragName = null;
function execDragStart(e, el){ _execDragName=el.dataset.gname; e.dataTransfer.effectAllowed='move'; el.style.opacity='0.5'; }
function execDragEnd(e, el)  { el.style.opacity=''; document.querySelectorAll('.gantt-drag-over').forEach(x=>x.classList.remove('gantt-drag-over')); }
function execDragOver(e, el) { e.preventDefault(); el.classList.add('gantt-drag-over'); }
function execDragLeave(el)   { el.classList.remove('gantt-drag-over'); }
function execDrop(e, el){
  e.preventDefault(); el.classList.remove('gantt-drag-over');
  const targetName=el.dataset.gname;
  if(!_execDragName||_execDragName===targetName){ _execDragName=null; return; }
  let filtered=getFiltered();
  let groups=getProjectGroups(filtered);
  if(S.hideDone) groups=groups.filter(g=>getProjectStatus(g.tasks)!=="Concluído");
  let names=S.execProjectOrder.length
    ?S.execProjectOrder.filter(n=>groups.some(g=>g.name===n))
    :groups.map(g=>g.name);
  groups.forEach(g=>{ if(!names.includes(g.name)) names.push(g.name); });
  const fi=names.indexOf(_execDragName), ti=names.indexOf(targetName);
  if(fi===-1||ti===-1){ _execDragName=null; return; }
  names.splice(fi,1); names.splice(ti,0,_execDragName);
  S.execProjectOrder=names; _execDragName=null;
  persist(); render();
}
function setGanttZoom(s,e)      { S.ganttZoomStart=s; S.ganttZoomEnd=e; render(); }

function saveTask() {

  if(!proj||!title) return;
  const status = document.getElementById("mt-status").value;

(async function boot() {
  const user = await checkAuth();
  if (!user) {
    // Not authenticated — show login screen
    document.getElementById('app').innerHTML = renderLoginScreen();
    return;
  }
  CURRENT_USER = user;
  loadState();
  render();
  loadFromSharePoint();
  // Sincronização automática a cada 30 segundos
  setInterval(function() {
    // Não atualiza se houver modal aberto (evita interromper o usuário)
    const modalAberto = document.querySelector('.modal-overlay[style*="flex"]');
    if (!modalAberto) loadFromSharePoint();
  }, 30000);
})();

}

function getInvData() { return INV_LIVE || INVENTORY_DATA; }
function updateInvCell(tabKey, rowIdx, col, val) {
  if (!INV_LIVE) INV_LIVE = JSON.parse(JSON.stringify(INVENTORY_DATA));
  if (INV_LIVE[tabKey] && INV_LIVE[tabKey].rows[rowIdx] !== undefined)
    INV_LIVE[tabKey].rows[rowIdx][col] = val===''?null:val;
}
function addInvRow(tabKey) {
  if (!INV_LIVE) INV_LIVE = JSON.parse(JSON.stringify(INVENTORY_DATA));
  const cols = INV_LIVE[tabKey].columns;
  const row = {};
  cols.forEach(c => row[c] = null);
  INV_LIVE[tabKey].rows.push(row);
  render();
}
function removeInvRow(tabKey, rowIdx) {
  if (!INV_LIVE || !INV_LIVE[tabKey]) return;
  if (!confirm('Remover esta linha?')) return;
  INV_LIVE[tabKey].rows.splice(rowIdx, 1);
  render();
}
function toggleInvEdit() {
  if (!INV_LIVE) INV_LIVE = JSON.parse(JSON.stringify(getInvData()));
  S.invEditMode = !S.invEditMode; render();
}
function saveInvEdits() {
  if (!INV_LIVE) return;
  // Capture any focused input value before save
  if (document.activeElement && document.activeElement.tagName === 'INPUT') {
    document.activeElement.dispatchEvent(new Event('input', {bubbles:true}));
  }
  const json = JSON.stringify(INV_LIVE);
  localStorage.setItem('fluidra_inv_live_v1', json);
  syncToSharePoint();
  // Verify save
  const verified = localStorage.getItem('fluidra_inv_live_v1');
  if (!verified) { alert('Erro ao salvar! Tente novamente.'); return; }
  S.invEditMode = false; render();
  const wsEmUso = INV_LIVE.workstations ? INV_LIVE.workstations.rows.filter(r=>(r['EM USO']||'').toUpperCase()==='S').length : 0;
  setTimeout(()=>{ const e=document.getElementById('inv-saved-toast'); if(e){e.textContent=`✅ Dados salvos! (${wsEmUso} workstation(s) marcadas como EM USO)`;e.style.opacity='1'; setTimeout(()=>e.style.opacity='0',3000);} },80);
}
function cancelInvEdits() {
  const saved=localStorage.getItem('fluidra_inv_live_v1');
  INV_LIVE = saved ? JSON.parse(saved) : null;
  S.invEditMode = false; render();
}
function resetInvToOriginal() {
  if(!confirm('Isso irá descartar TODAS as edições salvas e restaurar os dados originais. Confirma?')) return;
  localStorage.removeItem('fluidra_inv_live_v1'); INV_LIVE=null; S.invEditMode=false; render();
}

function invTable(columns, rows, passCols = [], allPass = false, tabKey = null) {
  if (!rows.length) return '<div class="inv-empty">Nenhum registro encontrado.</div>';
  const esc2 = v => v == null ? '—' : String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const escVal = v => v == null ? '' : String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const headers = columns.map(c => `<th>${esc2(c)}</th>`).join('');
  const editing = S.invEditMode && tabKey;
  const delHeader = editing ? '<th style="width:36px;"></th>' : '';
  const bodyRows = rows.map((r, i) => {
    const cells = columns.map(c => {
      const isPass = passCols.includes(c);
      if (editing) {
        const rawVal = r[c];
        return `<td style="padding:2px 4px;"><input type="text" value="${escVal(rawVal)}"
          oninput="updateInvCell('${tabKey}',${i},'${esc2(c)}',this.value)"
          style="width:100%;min-width:72px;border:1px solid #8393ff55;border-radius:4px;padding:3px 6px;font-size:11.5px;color:#001a70;background:#f8f9ff;font-family:inherit;"></td>`;
      }
      const val = esc2(r[c]);
      if (isPass && !allPass) return `<td class="inv-pass-cell nowrap">••••••••</td>`;
      return `<td class="${val.length > 40 ? 'wrap' : 'nowrap'}">${val}</td>`;
    }).join('');
    const delBtn = editing
      ? `<td style="padding:2px 4px;text-align:center;"><button onclick="removeInvRow('${tabKey}',${i})" title="Remover linha" style="background:none;border:none;cursor:pointer;font-size:15px;color:#C0392B;padding:2px 4px;" >🗑</button></td>`
      : '';
    return `<tr style="${editing?'background:#f8f9ff;':''}">${cells}${delBtn}</tr>`;
  }).join('');
  const addRowBtn = editing
    ? `<div style="margin-top:8px;"><button onclick="addInvRow('${tabKey}')"
        style="background:#001a70;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;">+ Adicionar linha</button></div>`
    : '';
  return `<div class="inv-table-wrap"><table class="inv-table"><thead><tr>${headers}${delHeader}</tr></thead><tbody>${bodyRows}</tbody></table></div>${addRowBtn}`;
}


// ── INVENTÁRIO DASHBOARD ───────────────────────────────────────────────────────

function renderInvDashboard() {
  const D = getInvData();
  const ws  = D.workstations.rows;
  const wsInUse = ws.filter(r=>(r['EM USO']||'').toUpperCase()==='S');
  const wsBase  = wsInUse.length > 0 ? wsInUse : ws; // fallback: all, if none marked yet
  const wsBaseLabel = wsInUse.length > 0 ? `${wsInUse.length} em uso` : `${ws.length} total (EM USO não preenchido)`;
  const mob = D.mobile.rows;
  const srv = D.servidores.rows;

  // ── helpers ──────────────────────────────────────────────────────────────────
  function procGen(proc) {
    if (!proc) return null;
    if (/ultra/i.test(proc)) return null; // Core Ultra é linha nova — não classificar por geração numérica
    const m = proc.match(/(\d+)(st|nd|rd|th)\s*Gen/i);
    if (m) return parseInt(m[1]);
    const m2 = proc.match(/Core\(TM\)[^\-]*[-\s](\d{4,5})/i);
    if (m2) { const n=m2[1]; return n.length>=5?parseInt(n.slice(0,2)):parseInt(n[0]); }
    return null;
  }
  function cnt(arr, fn) { return arr.filter(fn).length; }
  function grp(arr, key) {
    return arr.reduce((o,r)=>{ const k=r[key]||'N/D'; o[k]=(o[k]||0)+1; return o; }, {});
  }
  function safeInt(v) { const n=parseInt(v); return isNaN(n)?null:n; }

  const thisYear = new Date().getFullYear();

  // ── workstation stats ────────────────────────────────────────────────────────
  const wsTotal = ws.length;
  const wsUsedCount = wsInUse.length;
  const wsOldYear = wsBase.filter(r=>safeInt(r['ANO'])&&safeInt(r['ANO'])<=2020);
  const wsOldGen  = wsBase.filter(r=>{ const g=procGen(r['PROCESSADOR']); return g&&g<=7; });
  const wsWin10   = wsBase.filter(r=>r['S. O.']&&r['S. O.'].includes('Windows 10'));
  const wsLowRam  = wsBase.filter(r=>{ const ram=(r['RAM']||'').trim(); return /^[46]\s*(Gb|GB)/i.test(ram); });
  const wsByYear  = grp(wsBase,'ANO');
  const genDist   = {};
  wsBase.forEach(r=>{ const g=procGen(r['PROCESSADOR']); if(g) genDist[g]=(genDist[g]||0)+1; });
  const soDist    = {};
  wsBase.forEach(r=>{ const s=(r['S. O.']||'N/D').trim().replace('Windows ','Win '); soDist[s]=(soDist[s]||0)+1; });

  // combine old: year<=2020 OR gen<=7 (unique by S/N)
  const criticalSet = new Set();
  const criticalRows = [];
  [...wsOldYear, ...wsOldGen].forEach(r=>{
    if(!criticalSet.has(r['S/N'])) { criticalSet.add(r['S/N']); criticalRows.push(r); }
  });
  criticalRows.sort((a,b)=>(safeInt(a['ANO'])||9999)-(safeInt(b['ANO'])||9999));

  // ── mobile stats ─────────────────────────────────────────────────────────────
  const mobTotal  = mob.length;
  const mobBySite = {};
  mob.forEach(r=>{ if(r['LOCAL']&&r['LOCAL'].length<=5) mobBySite[r['LOCAL']]=(mobBySite[r['LOCAL']]||0)+1; });
  const mobOld = mob.filter(r=>safeInt(r['ANO'])&&safeInt(r['ANO'])<=2021);
  const mobByYear = grp(mob,'ANO');

  // ── server obsolete OS ───────────────────────────────────────────────────────
  const srvObs = srv.filter(r=>{
    const tipo=(r['Tipo. - Ano']||''), so=(r['Sistema Operacional']||'');
    return tipo.includes('2013')||so.includes('2012')||so.includes('CentOS 7')||so.includes('CentOS 8');
  });

  // ── renderer helpers ─────────────────────────────────────────────────────────
  function kpiCard(icon, val, label, color, bg) {
    return `<div style="background:${bg};border:1.5px solid ${color}25;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,26,112,.06);">
      <div style="width:44px;height:44px;background:${color}15;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${icon}</div>
      <div>
        <div style="font-size:30px;font-weight:800;color:${color};line-height:1;">${val}</div>
        <div style="font-size:11px;font-weight:600;color:#7A9BB5;margin-top:2px;">${label}</div>
      </div>
    </div>`;
  }

  function alertCard(icon, val, label, color, bg, sublabel='') {
    return `<div style="background:${bg};border:1.5px solid ${color}50;border-radius:10px;padding:14px 18px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:${sublabel?'4':'0'}px;">
        <span style="font-size:20px;">${icon}</span>
        <span style="font-size:28px;font-weight:800;color:${color};line-height:1;">${val}</span>
        <span style="font-size:12px;font-weight:700;color:${color};">${label}</span>
      </div>
      ${sublabel?`<div style="font-size:10px;color:${color}99;padding-left:30px;">${sublabel}</div>`:''}
    </div>`;
  }

  function hbar(label, val, maxVal, color) {
    const pct = Math.max(2, Math.round((val/maxVal)*100));
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
      <span style="font-size:11px;color:#1a1a3e;font-weight:600;min-width:38px;text-align:right;">${label}</span>
      <div style="flex:1;background:#f0eee8;border-radius:3px;height:14px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;"></div>
      </div>
      <span style="font-size:11px;color:#7A9BB5;min-width:20px;">${val}</span>
    </div>`;
  }

  const panel = (title, icon, content, extra='') => `
    <div style="background:#fff;border-radius:12px;border:1.5px solid #dddce8;padding:18px 20px;box-shadow:0 2px 8px rgba(0,26,112,.05);">
      <div style="font-size:12px;font-weight:700;color:#001a70;text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:7px;">${icon} ${title}${extra}</div>
      ${content}
    </div>`;

  const sectionTitle = (t) => `<div style="font-size:13px;font-weight:800;color:#001a70;margin:22px 0 12px;letter-spacing:.3px;">${t}</div>`;

  // ── KPI CARDS ────────────────────────────────────────────────────────────────
  const kpiRow = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;">
    ${kpiCard('💻', wsUsedCount>0?wsUsedCount+' / '+wsTotal:wsTotal, wsUsedCount>0?'Em Uso / Total WS':'Workstations', '#001a70', '#fff')}
    ${kpiCard('📱', mobTotal, 'Dispositivos Móveis', '#8393ff', '#eef0ff')}
    ${kpiCard('🖥️', srv.length, 'Servidores', '#27AE60', '#E9F7EF')}
    ${kpiCard('🖨️', D.impressoras.rows.length+D.impressoras_gpo.rows.length, 'Impressoras', '#E67E22', '#FEF0E7')}
    ${kpiCard('📦', D.coletores.rows.length, 'Coletores', '#7A9BB5', '#F0F5FA')}
  </div>`;

  // ── ALERT CARDS ──────────────────────────────────────────────────────────────
  const alertRow = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;">
    ${alertCard('⏰', wsOldYear.length, 'Antigos por Ano', '#C0392B', '#FDECEA', 'Workstations com ano ≤ 2020')}
    ${alertCard('🔧', wsOldGen.length, 'Proc. Desatualizado', '#E67E22', '#FEF0E7', 'Intel ≤ 7ª Geração')}
    ${alertCard('🪟', wsWin10.length, 'Windows 10', '#B87A00', '#FEF9E7', 'Atualização necessária')}
    ${alertCard('🐏', wsLowRam.length, 'RAM < 8 GB', '#6570eb', '#eef0ff', 'Abaixo do padrão recomendado')}
  </div>`;

  // ── YEAR DIST ────────────────────────────────────────────────────────────────
  const maxYearVal = Math.max(...Object.values(wsByYear));
  const yearBarHtml = Object.entries(wsByYear).filter(([y])=>y&&y!=='N/D')
    .sort((a,b)=>parseInt(a[0])-parseInt(b[0]))
    .map(([y,n])=>{
      const yr=parseInt(y);
      const col = yr<=2019?'#C0392B':yr<=2020?'#E67E22':yr<=2022?'#F5A623':yr<=2024?'#8393ff':'#27AE60';
      return hbar(y, n, maxYearVal, col);
    }).join('');

  const yearPanel = panel('Workstations por Ano', '📅',
    yearBarHtml +
    `<div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#C0392B;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">≤ 2019 (crítico)</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#E67E22;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">2020</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#8393ff;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">2021–2024</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#27AE60;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">${thisYear}+</span></div>
    </div>`);

  // ── GEN DIST ─────────────────────────────────────────────────────────────────
  const maxGen = Math.max(...Object.values(genDist));
  const genBarHtml = Object.entries(genDist)
    .sort((a,b)=>parseInt(a[0])-parseInt(b[0]))
    .map(([g,n])=>{
      const gen=parseInt(g);
      const col = gen<=7?'#C0392B':gen<=10?'#E67E22':gen<=12?'#8393ff':'#27AE60';
      const suffix = gen<=7?'ª ⚠':gen<=10?'ª':'ª';
      return hbar(gen+suffix, n, maxGen, col);
    }).join('');

  const genPanel = panel('Gerações de Processador', '🔬',
    genBarHtml +
    `<div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#C0392B;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">≤ 7ª (obsoleto)</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#E67E22;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">8ª–10ª (atenção)</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#8393ff;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">11ª–12ª (bom)</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:10px;height:10px;background:#27AE60;border-radius:2px;"></div><span style="font-size:10px;color:#7A9BB5;">13ª+ (atual)</span></div>
    </div>`);

  // ── SO DIST ──────────────────────────────────────────────────────────────────
  const soMerged = {};
  Object.entries(soDist).forEach(([k,v])=>{
    const clean = k.trim();
    soMerged[clean] = (soMerged[clean]||0)+v;
  });
  const soMaxVal = Math.max(...Object.values(soMerged));
  const soBarHtml = Object.entries(soMerged).sort((a,b)=>b[1]-a[1])
    .map(([s,n])=>{
      const col=s.includes('10')?'#E67E22':s.includes('Mac')?'#7A9BB5':'#8393ff';
      return hbar(s.length>14?s.slice(0,14)+'…':s, n, soMaxVal, col);
    }).join('');

  const soPanel = panel('Sistema Operacional (WS)', '🪟', soBarHtml);

  // ── CRITICAL LIST ────────────────────────────────────────────────────────────
  const critRows = criticalRows.slice(0,20).map(r=>{
    const yr=safeInt(r['ANO'])||'?';
    const gen=procGen(r['PROCESSADOR']);
    const isOldYear=yr<=2020, isOldGen=gen&&gen<=7;
    const proc=(r['PROCESSADOR']||'N/D').replace(/Intel\(R\)|Core\(TM\)|CPU\s*@\s*[\d\.]+GHz/gi,'').trim().slice(0,34);
    const tagYear=isOldYear?`<span style="background:#FDECEA;color:#C0392B;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;">Ano ${yr}</span>`:'';
    const tagGen=isOldGen?`<span style="background:#FEF0E7;color:#E67E22;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;">${gen}ª Gen</span>`:'';
    const soTag=r['S. O.']&&r['S. O.'].includes('10')?`<span style="background:#FEF9E7;color:#B87A00;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;">Win 10</span>`:'';
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f3ef;flex-wrap:wrap;">
      <span style="font-size:12px;color:#001a70;font-weight:700;min-width:180px;">${esc(r['COLABORADOR']||r['HOSTNAME']||'N/D')}</span>
      <span style="font-size:11px;color:#7A9BB5;flex:1;min-width:120px;">${esc(proc)}</span>
      <div style="display:flex;gap:4px;">${tagYear}${tagGen}${soTag}</div>
    </div>`;
  }).join('');

  const moreCount = criticalRows.length - 20;
  const critPanel = panel('Equipamentos Críticos', '⚠️',
    critRows +
    (moreCount>0?`<div style="font-size:11px;color:#8393ff;margin-top:8px;">+${moreCount} outros — veja a aba Workstations</div>`:''),
    `<span style="background:#FDECEA;color:#C0392B;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;margin-left:8px;">${criticalRows.length}</span>`
  );

  // ── MOBILE PANEL ─────────────────────────────────────────────────────────────
  const mobMaxSite = Math.max(...Object.values(mobBySite));
  const mobSiteBar = Object.entries(mobBySite).sort((a,b)=>b[1]-a[1])
    .map(([s,n])=>hbar(s, n, mobMaxSite, '#8393ff')).join('');

  const mobOldHtml = mobOld.length>0
    ? mobOld.slice(0,5).map(r=>`<div style="font-size:12px;color:#C0392B;padding:3px 0;">• ${esc(r['CELULAR / LINHAS MOVEIS']||'')} — ${r['DISPOSITIVO /ANO']||''} (${r['ANO']||'?'})</div>`).join('')
    : `<div style="font-size:12px;color:#27AE60;">✔ Todos os dispositivos são recentes.</div>`;

  const mobPanel = panel('Mobile', '📱',
    `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div>
        <div style="font-size:11px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Por Site</div>
        ${mobSiteBar}
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Dispositivos Antigos (≤ 2021)</div>
        ${mobOldHtml}
      </div>
    </div>`);

  // ── SERVERS PANEL ────────────────────────────────────────────────────────────
  const allSrvHtml = srv.map(r=>{
    const tipo=(r['Tipo. - Ano']||'').trim();
    const so=(r['Sistema Operacional']||'N/D').trim();
    const isObs=tipo.includes('2013')||so.includes('2012')||so.includes('CentOS 7');
    const rowBg = isObs?'background:#FDECEA;':'';
    return `<tr style="${rowBg}border-bottom:1px solid #f0eee8;">
      <td style="padding:6px 10px;font-size:12px;font-weight:700;color:#001a70;">${esc(r['Name Server']||'N/D')}</td>
      <td style="padding:6px 10px;font-size:11px;color:#7A9BB5;">${esc(r['Local']||'N/D')}</td>
      <td style="padding:6px 10px;font-size:11px;color:#1a1a3e;">${esc(tipo||'N/D')}</td>
      <td style="padding:6px 10px;font-size:11px;color:#1a1a3e;">${esc(so)}</td>
      <td style="padding:6px 4px;text-align:center;">${isObs?'<span style="background:#FDECEA;color:#C0392B;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;">⚠ Obsoleto</span>':''}</td>
    </tr>`;
  }).join('');

  const srvPanel = panel('Servidores', '🖥️',
    `<div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#001a70;">
          ${['Servidor','Local','Tipo / Ano','Sistema Operacional',''].map(h=>`<th style="padding:7px 10px;text-align:left;color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${allSrvHtml}</tbody>
      </table>
    </div>`,
    srvObs.length>0?`<span style="background:#FDECEA;color:#C0392B;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;margin-left:8px;">${srvObs.length} obsoleto(s)</span>`:''
  );

  // ── ESTOQUE PANEL ────────────────────────────────────────────────────────────
  const estoqueHtml = D.estoque.rows.map(r=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f3ef;">
      <div>
        <span style="font-size:12px;font-weight:700;color:#001a70;">${esc(r['Equipamento']||'')}</span>
        <span style="font-size:11px;color:#7A9BB5;margin-left:8px;">${esc(r['Modelo']||'')}</span>
      </div>
      <span style="background:#001a70;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;">${r['Quantidade']||0}</span>
    </div>`).join('');

  const estPanel = panel('Estoque de Ativos', '🔧', estoqueHtml);

  // ── FINAL LAYOUT ─────────────────────────────────────────────────────────────
  return `<div style="padding:20px 24px 40px;">
    ${kpiRow}

// ── COMPRAS T.I. ──────────────────────────────────────────────────────────────

const COMP_KEY = 'fluidra_compras_v1';
let _compPendingFile = null;

function loadCompras() {
  try { return JSON.parse(localStorage.getItem(COMP_KEY) || '[]'); } catch(e) { return []; }
}
function saveCompras(arr, _skipSync=false) { localStorage.setItem(COMP_KEY, JSON.stringify(arr)); if(!_skipSync) syncToSharePoint(); }
function compId() { return 'c' + Date.now() + Math.random().toString(36).slice(2,7); }

function goCompras() { S.page="compras"; S.comprasView="kanban"; S.comprasModal=null; render(); }
function closeComprasModal() { S.comprasModal=null; _compPendingFile=null; render(); }

function openNovaCompra() { S.comprasModal={type:'nova',data:{}}; render(); }
function openEditarCompra(id) {
  const p = loadCompras().find(x=>x.id===id);
  if(!p) return;
  S.comprasModal={type:'editar',purchase:JSON.parse(JSON.stringify(p))}; render();
}
function avancarParaCaminho(id) { S.comprasModal={type:'caminho',purchaseId:id}; render(); }
function avancarParaRecebido(id) { S.comprasModal={type:'recebido',purchaseId:id}; render(); }
function openFinalizarCompra(id) { S.comprasModal={type:'finalizar',purchaseId:id}; render(); }

function deletarCompra(id) {
  if(!confirm('Remover esta compra?')) return;
  saveCompras(loadCompras().filter(x=>x.id!==id)); render();
}

function saveNovaCompra() {
  const eq=document.getElementById('cp-eq')?.value?.trim();
  if(!eq){alert('Informe o equipamento.');return;}
  const arr=loadCompras(), now=new Date().toISOString();
  arr.push({id:compId(),phase:'necessidade',equipamento:eq,
    quantidade:parseInt(document.getElementById('cp-qtd')?.value)||1,
    urgencia:document.getElementById('cp-urg')?.value||'Média',
    usuarioSetor:document.getElementById('cp-user')?.value?.trim()||'',
    linkCompra:document.getElementById('cp-link')?.value?.trim()||'',
    infoComplementar:document.getElementById('cp-info')?.value?.trim()||'',
    loja:'',dataEntregaPrev:'',nfAnexoName:'',nfAnexoData:null,
    numeroPedido:'',nfLancada:false,criadoEm:now,atualizadoEm:now});
  saveCompras(arr); S.comprasModal=null; render();
}

function saveEditarCompra(id) {
  const eq=document.getElementById('cp-eq')?.value?.trim();
  if(!eq){alert('Informe o equipamento.');return;}
  const arr=loadCompras(), p=arr.find(x=>x.id===id); if(!p) return;
  Object.assign(p,{equipamento:eq,
    quantidade:parseInt(document.getElementById('cp-qtd')?.value)||1,
    urgencia:document.getElementById('cp-urg')?.value||'Média',
    usuarioSetor:document.getElementById('cp-user')?.value?.trim()||'',
    linkCompra:document.getElementById('cp-link')?.value?.trim()||'',
    infoComplementar:document.getElementById('cp-info')?.value?.trim()||'',
    atualizadoEm:new Date().toISOString()});
  saveCompras(arr); S.comprasModal=null; render();
}

function saveAvancarCaminho(id) {
  const loja=document.getElementById('ac-loja')?.value?.trim();
  if(!loja){alert('Informe a loja.');return;}
  const arr=loadCompras(), p=arr.find(x=>x.id===id); if(!p) return;
  Object.assign(p,{phase:'caminho',loja,dataEntregaPrev:document.getElementById('ac-data')?.value||'',atualizadoEm:new Date().toISOString()});
  if(_compPendingFile){p.nfAnexoName=_compPendingFile.name;p.nfAnexoData=_compPendingFile.data;_compPendingFile=null;}
  saveCompras(arr); S.comprasModal=null; render();
}

function saveAvancarRecebido(id) {
  const arr=loadCompras(), p=arr.find(x=>x.id===id); if(!p) return;
  p.phase='recebido'; p.atualizadoEm=new Date().toISOString();
  if(_compPendingFile){p.nfAnexoName=_compPendingFile.name;p.nfAnexoData=_compPendingFile.data;_compPendingFile=null;}
  saveCompras(arr); S.comprasModal=null; render();
}

function saveFinalizarCompra(id) {
  const pedido=document.getElementById('rf-pedido')?.value?.trim();
  if(!pedido){alert('Informe o número do pedido.');return;}
  if(!document.getElementById('rf-nf')?.checked){alert('Confirme que a NF foi lançada no ERP.');return;}
  const arr=loadCompras(), p=arr.find(x=>x.id===id); if(!p) return;
  Object.assign(p,{phase:'finalizado',numeroPedido:pedido,nfLancada:true,atualizadoEm:new Date().toISOString()});
  saveCompras(arr); S.comprasModal=null; render();
}

function attachCompraFile() {
  const inp=document.getElementById('comp-file-input'); if(!inp) return;
  inp.onchange=function(){
    const file=this.files[0]; if(!file) return;
    if(file.size>3e6){alert('Arquivo muito grande (máx 3MB).');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      _compPendingFile={name:file.name,data:e.target.result};
      const lbl=document.getElementById('comp-file-label');
      if(lbl) lbl.querySelector('span').textContent='📎 '+file.name;
    };
    reader.readAsDataURL(file);
  };
}

// ── RENDER COMPRAS ────────────────────────────────────────────────────────────

function renderCompras() {
  const purchases=loadCompras();
  const byPhase={
    necessidade:purchases.filter(p=>p.phase==='necessidade'),
    caminho:    purchases.filter(p=>p.phase==='caminho'),
    recebido:   purchases.filter(p=>p.phase==='recebido'),
    finalizado: purchases.filter(p=>p.phase==='finalizado'),
  };

  const header=`<div id="header" style="background:#001a70;height:56px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;">
    <div class="hd-left">
      <button class="hd-back" onclick="goHome()">← Início</button>
      <div class="hd-divider"></div>
      <span class="hd-title">Compras T.I.</span>
    </div>
    <div class="hd-btns">
      <button class="btn-outline" onclick="S.comprasView='finalizadas';render();" style="${S.comprasView==='finalizadas'?'background:rgba(255,255,255,.2);':''}">📋 Histórico</button>
      <button class="btn-primary" onclick="openNovaCompra()">+ Nova Necessidade</button>
    </div>
  </div>`;

  const modal=S.comprasModal?renderComprasModal(S.comprasModal,purchases):'';
  const body=S.comprasView==='finalizadas'
    ?renderComprasFinalizadas(byPhase.finalizado)
    :renderComprasDashboard(byPhase)+renderComprasKanban(byPhase);

  return `<div style="background:#f1efe9;min-height:100vh;">${header}${body}${modal}</div>`;
}

function renderComprasDashboard(bp) {
  const total=bp.necessidade.length+bp.caminho.length+bp.recebido.length+bp.finalizado.length;
  const stats=[
    {label:'Necessidades',count:bp.necessidade.length,color:'#8393ff',bg:'#eef0ff',icon:'📋'},
    {label:'A Caminho',   count:bp.caminho.length,    color:'#E67E22',bg:'#FEF0E7',icon:'🚚'},
    {label:'Recebidos',   count:bp.recebido.length,   color:'#27AE60',bg:'#E9F7EF',icon:'📥'},
    {label:'Finalizados', count:bp.finalizado.length, color:'#7A9BB5',bg:'#f0f5fa',icon:'✅'},
  ];
  const cards=stats.map(s=>`
    <div style="background:#fff;border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:14px;border:1.5px solid #dddce8;box-shadow:0 2px 8px rgba(0,26,112,.06);">
      <div style="width:44px;height:44px;background:${s.bg};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;">${s.icon}</div>
      <div>
        <div style="font-size:30px;font-weight:800;color:${s.color};line-height:1;">${s.count}</div>
        <div style="font-size:11px;font-weight:600;color:#7A9BB5;margin-top:2px;">${s.label}</div>
      </div>
    </div>`).join('');

  const urgBp={Alta:0,Média:0,Baixa:0};
  bp.necessidade.forEach(p=>{urgBp[p.urgencia]=(urgBp[p.urgencia]||0)+1;});
  const urgColors={Alta:'#C0392B',Média:'#E67E22',Baixa:'#27AE60'};
  const urgBadges=Object.entries(urgBp).filter(([,n])=>n>0)
    .map(([u,n])=>`<span style="background:${urgColors[u]};color:#fff;border-radius:4px;padding:2px 10px;font-size:11px;font-weight:700;">${u}: ${n}</span>`).join(' ');

  // Proximas entregas
  const proximas=bp.caminho.filter(p=>p.dataEntregaPrev).sort((a,b)=>a.dataEntregaPrev.localeCompare(b.dataEntregaPrev)).slice(0,3);
  const entregasHtml=proximas.length?proximas.map(p=>{
    const d=new Date(p.dataEntregaPrev+'T12:00:00');
    const hoje=new Date(); hoje.setHours(0,0,0,0);
    const diff=Math.round((d-hoje)/86400000);
    const cor=diff<0?'#C0392B':diff<=3?'#E67E22':'#27AE60';
    const label=diff<0?`${Math.abs(diff)}d atrasado`:diff===0?'hoje':diff===1?'amanhã':`${diff}d`;
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0eee8;">
      <span style="color:${cor};font-weight:700;font-size:11px;min-width:60px;">${label}</span>
      <span style="font-size:12px;color:#1a1a3e;flex:1;">${p.equipamento} <span style="color:#7A9BB5;">· ${p.loja||'—'}</span></span>
    </div>`;
  }).join(''):'<div style="font-size:12px;color:#B0C8D8;padding:8px 0;">Nenhuma entrega prevista.</div>';

  return `<div style="padding:20px 28px 0;">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:16px;">${cards}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      <div style="background:#fff;border-radius:10px;border:1.5px solid #dddce8;padding:16px;">
        <div style="font-size:11px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">Urgência em Aberto</div>
        ${urgBadges||'<span style="color:#B0C8D8;font-size:12px;">Sem necessidades pendentes</span>'}
        ${bp.necessidade.length>0?`<div style="margin-top:12px;border-top:1px solid #f0eee8;padding-top:10px;">
          ${bp.necessidade.slice(0,4).map(p=>`<div style="font-size:12px;color:#1a1a3e;padding:3px 0;">${p.equipamento} <span style="color:#7A9BB5;">· ${p.usuarioSetor||'—'}</span></div>`).join('')}
          ${bp.necessidade.length>4?`<div style="font-size:11px;color:#8393ff;margin-top:4px;">+${bp.necessidade.length-4} mais</div>`:''}
        </div>`:''}
      </div>
      <div style="background:#fff;border-radius:10px;border:1.5px solid #dddce8;padding:16px;">
        <div style="font-size:11px;font-weight:700;color:#7A9BB5;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">📅 Próximas Entregas</div>
        ${entregasHtml}
      </div>
    </div>
  </div>`;
}

function renderComprasKanban(bp) {
  const cols=[
    {id:'necessidade',label:'📋 Necessidade de Compra',color:'#8393ff',bg:'#eef0ff',items:bp.necessidade},
    {id:'caminho',    label:'🚚 Equipamento a Caminho', color:'#E67E22',bg:'#FEF0E7',items:bp.caminho},
    {id:'recebido',   label:'📥 Equipamento Recebido',  color:'#27AE60',bg:'#E9F7EF',items:bp.recebido},
  ];
  const colsHtml=cols.map(col=>{
    const cards=col.items.map(p=>renderCompraCard(p,col.id)).join('');
    return `<div style="flex:1;min-width:260px;">
      <div style="background:${col.bg};border-radius:10px 10px 0 0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid ${col.color};">
        <span style="font-size:13px;font-weight:700;color:${col.color};">${col.label}</span>
        <span style="background:${col.color};color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700;">${col.items.length}</span>
      </div>
      <div style="background:#fff;border-radius:0 0 10px 10px;border:1.5px solid #dddce8;border-top:none;padding:10px;min-height:80px;max-height:calc(100vh - 340px);overflow-y:auto;">

  }).join('');
  return `<div style="padding:0 28px 40px;"><div style="display:flex;gap:16px;align-items:flex-start;overflow-x:auto;padding-top:4px;">${colsHtml}</div></div>`;
}

function renderCompraCard(p,phase) {
  const uc={Alta:'#C0392B',Média:'#E67E22',Baixa:'#27AE60'};
  const ub={Alta:'#FDECEA',Média:'#FEF0E7',Baixa:'#E9F7EF'};
  const urg=p.urgencia||'Média';
  const dt=p.criadoEm?new Date(p.criadoEm).toLocaleDateString('pt-BR'):'';

  let phaseInfo='', actionBtn='';

  if(phase==='necessidade'){
    if(p.linkCompra) phaseInfo+=`<a href="${p.linkCompra}" target="_blank" style="display:block;font-size:11px;color:#8393ff;text-decoration:none;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🔗 ${p.linkCompra.replace(/^https?:\/\//,'').slice(0,35)}</a>`;
    if(p.infoComplementar) phaseInfo+=`<div style="font-size:11px;color:#7A9BB5;margin-top:3px;line-height:1.4;">ℹ️ ${p.infoComplementar.slice(0,70)}${p.infoComplementar.length>70?'...':''}</div>`;
    actionBtn=`<button onclick="avancarParaCaminho('${p.id}')" style="background:#001a70;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;">🛒 Transformar em Compra</button>`;

  } else if(phase==='caminho'){
    phaseInfo+=`<div style="font-size:11px;color:#7A9BB5;margin-top:4px;">🏪 ${p.loja||'—'}</div>`;
    if(p.dataEntregaPrev){
      const d=new Date(p.dataEntregaPrev+'T12:00:00'), hoje=new Date(); hoje.setHours(0,0,0,0);
      const diff=Math.round((d-hoje)/86400000);
      const cor=diff<0?'#C0392B':diff<=3?'#E67E22':'#27AE60';
      const label=diff<0?`Atrasado ${Math.abs(diff)}d`:diff===0?'Hoje':diff===1?'Amanhã':`Em ${diff} dias`;
      phaseInfo+=`<div style="font-size:11px;margin-top:3px;"><span style="color:${cor};font-weight:700;">📅 ${label}</span> <span style="color:#B0C8D8;">(${new Date(p.dataEntregaPrev+'T12:00:00').toLocaleDateString('pt-BR')})</span></div>`;
    }
    if(p.nfAnexoName) phaseInfo+=`<div style="font-size:11px;color:#27AE60;margin-top:3px;">📎 ${p.nfAnexoName}</div>`;
    actionBtn=`<button onclick="avancarParaRecebido('${p.id}')" style="background:#27AE60;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;">✅ Recebido</button>`;

  } else if(phase==='recebido'){
    if(p.loja) phaseInfo+=`<div style="font-size:11px;color:#7A9BB5;margin-top:4px;">🏪 ${p.loja}</div>`;
    if(p.nfAnexoName) phaseInfo+=`<div style="font-size:11px;color:#27AE60;margin-top:3px;">📎 ${p.nfAnexoName}</div>`;
    actionBtn=`<button onclick="openFinalizarCompra('${p.id}')" style="background:#8393ff;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;">🏁 Finalizar Compra</button>`;
  }

  return `<div style="background:#fff;border-radius:8px;padding:12px;border:1.5px solid #eee;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,26,112,.06);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
      <span style="background:${ub[urg]};color:${uc[urg]};border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;">${urg}</span>
      <div>
        <button onclick="openEditarCompra('${p.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;padding:0 2px;color:#7A9BB5;" title="Editar">✏️</button>
        <button onclick="deletarCompra('${p.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;padding:0 2px;color:#C0392B;" title="Remover">🗑️</button>
      </div>
    </div>
    <div style="font-weight:700;font-size:13px;color:#001a70;line-height:1.3;">${p.equipamento}</div>
    <div style="font-size:11px;color:#7A9BB5;margin-top:2px;">Qtd: <b>${p.quantidade}</b>${p.usuarioSetor?' · '+p.usuarioSetor:''}</div>
    ${phaseInfo}
    ${actionBtn}
    <div style="font-size:10px;color:#C0C8D8;margin-top:6px;text-align:right;">${dt}</div>
  </div>`;
}

        <td style="padding:9px 14px;text-align:center;">${p.quantidade}</td>

    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;">
      <button onclick="S.comprasView='kanban';render();" style="background:#f1efe9;border:1.5px solid #dddce8;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;color:#001a70;cursor:pointer;">← Voltar</button>
      <span style="font-size:16px;font-weight:800;color:#001a70;">📋 Histórico de Compras Finalizadas</span>
      <span style="background:#001a70;color:#fff;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;">${items.length}</span>

      <table style="width:100%;border-collapse:collapse;font-size:12.5px;">
        <thead><tr style="background:#001a70;">
          <th style="padding:10px 14px;text-align:left;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;">Equipamento</th>

          <th style="padding:10px 14px;text-align:center;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;">NF ERP</th>

        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderComprasModal(modal,purchases) {
  const OV='position:fixed;inset:0;background:rgba(0,30,60,.45);display:flex;align-items:center;justify-content:center;z-index:1000;';
  const BX='background:#fff;border-radius:12px;padding:28px;width:520px;max-width:95vw;box-shadow:0 8px 40px rgba(0,26,112,.18);max-height:90vh;overflow-y:auto;';
  const HDR=(title)=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <span style="font-size:16px;font-weight:700;color:#001a70;">${title}</span>
    <button onclick="closeComprasModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#7A9BB5;line-height:1;">×</button>
  </div>`;
  const FLD=(label,required='')=>`<label style="font-size:12px;font-weight:600;color:#001a70;display:block;margin-bottom:4px;">${label}${required?' *':''}</label>`;
  const fileBtn=`<label style="display:flex;align-items:center;gap:10px;background:#f9f8f5;border:1.5px dashed #dddce8;border-radius:8px;padding:10px 16px;cursor:pointer;font-size:12px;font-weight:600;color:#001a70;margin-bottom:20px;">
    <span id="comp-file-label">📎 Selecionar arquivo NF (PDF, imagem, máx 3MB)</span>
    <input id="comp-file-input" type="file" accept=".pdf,.jpg,.jpeg,.png" style="display:none;">
  </label>`;

  let inner='';

  if(modal.type==='nova'||modal.type==='editar'){
    const p=modal.purchase||{};
    const isEdit=modal.type==='editar';
    const saveAction=isEdit?`saveEditarCompra('${p.id}')`:'saveNovaCompra()';
    inner=`${HDR(isEdit?'✏️ Editar Item':'📋 Nova Necessidade de Compra')}
      <div style="margin-bottom:12px;">${FLD('Equipamento',true)}<input id="cp-eq" class="form-input" value="${(p.equipamento||'').replace(/"/g,'&quot;')}" placeholder="Ex: Notebook Dell Inspiron 15, Mouse sem fio..."></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div>${FLD('Quantidade',true)}<input id="cp-qtd" class="form-input" type="number" min="1" value="${p.quantidade||1}"></div>
        <div>${FLD('Urgência')}<select id="cp-urg" class="form-select"><option${(p.urgencia||'Média')==='Alta'?' selected':''}>Alta</option><option${(p.urgencia||'Média')==='Média'?' selected':''}>Média</option><option${(p.urgencia||'Média')==='Baixa'?' selected':''}>Baixa</option></select></div>
      </div>
      <div style="margin-bottom:12px;">${FLD('Usuário / Setor')}<input id="cp-user" class="form-input" value="${(p.usuarioSetor||'').replace(/"/g,'&quot;')}" placeholder="Ex: João Silva / Comercial"></div>
      <div style="margin-bottom:12px;">${FLD('Link do Site de Compra')}<input id="cp-link" class="form-input" value="${(p.linkCompra||'').replace(/"/g,'&quot;')}" placeholder="https://..."></div>
      <div style="margin-bottom:20px;">${FLD('Informações Complementares')}<textarea id="cp-info" class="form-textarea" style="min-height:80px;" placeholder="Especificações, justificativa, configuração desejada...">${p.infoComplementar||''}</textarea></div>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="closeComprasModal()" class="btn-cancel">Cancelar</button>
        <button onclick="${saveAction}" class="btn-save">${isEdit?'Salvar Alterações':'Registrar Necessidade'}</button>
      </div>`;

  } else if(modal.type==='caminho'){
    const p=purchases.find(x=>x.id===modal.purchaseId)||{};
    inner=`${HDR('🛒 Registrar Compra')}
      <div style="background:#FEF0E7;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#E67E22;font-weight:600;">${p.equipamento} <span style="font-weight:400;">— Qtd: ${p.quantidade}</span></div>
      <div style="margin-bottom:12px;">${FLD('Loja / Fornecedor',true)}<input id="ac-loja" class="form-input" placeholder="Ex: Kabum, Amazon, Pichau, Mercado Livre..."></div>
      <div style="margin-bottom:16px;">${FLD('Data Prevista de Entrega')}<input id="ac-data" class="form-input" type="date"></div>
      ${fileBtn}
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="closeComprasModal()" class="btn-cancel">Cancelar</button>
        <button onclick="saveAvancarCaminho('${p.id}')" style="background:#E67E22;color:#fff;border:none;border-radius:6px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;">Confirmar Compra →</button>
      </div>`;

  } else if(modal.type==='recebido'){
    const p=purchases.find(x=>x.id===modal.purchaseId)||{};
    inner=`${HDR('📥 Confirmar Recebimento')}
      <div style="background:#E9F7EF;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#27AE60;font-weight:600;">${p.equipamento} — <span style="font-weight:400;">${p.loja||'—'}</span></div>
      <div style="margin-bottom:8px;font-size:12px;font-weight:600;color:#001a70;">Nota Fiscal${p.nfAnexoName?' (substituir arquivo)':''}</div>
      <label style="display:flex;align-items:center;gap:10px;background:#f9f8f5;border:1.5px dashed #dddce8;border-radius:8px;padding:10px 16px;cursor:pointer;font-size:12px;font-weight:600;color:#001a70;margin-bottom:20px;">
        <span id="comp-file-label">📎 ${p.nfAnexoName?p.nfAnexoName+' (substituir)':'Selecionar NF (PDF, imagem)'}</span>
        <input id="comp-file-input" type="file" accept=".pdf,.jpg,.jpeg,.png" style="display:none;">
      </label>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="closeComprasModal()" class="btn-cancel">Cancelar</button>
        <button onclick="saveAvancarRecebido('${p.id}')" style="background:#27AE60;color:#fff;border:none;border-radius:6px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;">Confirmar Recebimento →</button>
      </div>`;

  } else if(modal.type==='finalizar'){
    const p=purchases.find(x=>x.id===modal.purchaseId)||{};
    inner=`${HDR('🏁 Finalizar Compra')}
      <div style="background:#eef0ff;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#001a70;font-weight:600;">${p.equipamento} — Qtd: ${p.quantidade}</div>
      <div style="margin-bottom:12px;">${FLD('Número do Pedido de Compras',true)}<input id="rf-pedido" class="form-input" placeholder="Ex: PC-2025-042" value="${(p.numeroPedido||'').replace(/"/g,'&quot;')}"></div>
      <div style="background:#f7f6f2;border-radius:8px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;">
        <input id="rf-nf" type="checkbox" style="margin-top:2px;accent-color:#001a70;width:16px;height:16px;flex-shrink:0;" ${p.nfLancada?'checked':''}>
        <div>
          <label for="rf-nf" style="font-size:13px;font-weight:600;color:#001a70;cursor:pointer;">Confirmo que a NF foi lançada no ERP</label>
          <div style="font-size:11px;color:#7A9BB5;margin-top:3px;">Esta confirmação é obrigatória para arquivar a compra.</div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="closeComprasModal()" class="btn-cancel">Cancelar</button>
        <button onclick="saveFinalizarCompra('${p.id}')" style="background:#8393ff;color:#fff;border:none;border-radius:6px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;">Finalizar e Arquivar</button>
      </div>`;
  }

  return `<div style="${OV}" onclick="if(event.target===this)closeComprasModal();"><div style="${BX}">${inner}</div></div>`;
}

function goDiscovery() { S.page="discovery"; render(); }

      <div style="display:flex;gap:5px;" onclick="event.stopPropagation()">

      </div>
      <span style="color:#7A9BB5;font-size:14px;flex-shrink:0;">${expanded?"▾":"▸"}</span>
    </div>
    ${expanded?`<div style="padding:0 16px 14px;border-top:1px solid #f0eee8;">

const OUTLOOK_URL = 'https://default07e1122d06584d8da36096ab734956.ca.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/08/workflows/0597bc367a614278aa8620a2b8af1f7c/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QXkTMTlplE-wl3RDM93t0WftoPiaCVE_imlgxXRo7Kc'; // Preencha com a URL do fluxo GTI_Agenda após criá-lo no Power Automate

function meudiaDateFromUTC(dtStr) {
  // dtStr like "2026-07-17T11:00:00.0000000" — treat as UTC
  return new Date(dtStr.replace(/\.\d+$/, '') + 'Z');
}

function meudiaEventBRTTime(dtStr) {
  const dt = meudiaDateFromUTC(dtStr);
  return dt.toLocaleTimeString('pt-BR', {timeZone:'America/Sao_Paulo', hour:'2-digit', minute:'2-digit', hour12:false});
}

function meudiaEventBRTDate(dtStr) {
  const dt = meudiaDateFromUTC(dtStr);
  return dt.toLocaleDateString('en-CA', {timeZone:'America/Sao_Paulo'});
}
function meudiaGetDT(val) {
  // PA Outlook connector returns start/end as string; M365 returns {dateTime, timeZone}
  return typeof val === 'string' ? val : (val && val.dateTime ? val.dateTime : null);
}

function meudiaGetWeekStart(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  let dow = d.getDay(); // 0=Sun
  dow = dow === 0 ? 6 : dow - 1; // Mon=0..Sun=6
  const mon = new Date(d);
  mon.setDate(d.getDate() - dow);
  return mon.toISOString().split('T')[0];
}

function meudiaEventsForDate(dateStr) {
  const personal = S.meudiaItems.filter(x => x.date === dateStr);
  const outlook = S.meudiaOutlookEvents.filter(ev => {
    const _startDT = meudiaGetDT(ev.start);
    if (!_startDT) return false;
    return meudiaEventBRTDate(_startDT) === dateStr;
  });
  return {personal, outlook};
}

async function meudiaFetchForCurrentView() {
  if (!OUTLOOK_URL) return;
  let start = S.meudiaDate, end = S.meudiaDate;
  if (S.meudiaView === 'semana') {
    const ws = meudiaGetWeekStart(S.meudiaDate);
    const we = new Date(ws + 'T12:00:00'); we.setDate(we.getDate() + 6);
    start = ws; end = we.toISOString().split('T')[0];
  } else if (S.meudiaView === 'mes') {
    const [y, m] = S.meudiaDate.split('-').map(Number);
    start = `${y}-${String(m).padStart(2,'0')}-01`;
    const lastD = new Date(y, m, 0).getDate();
    end = `${y}-${String(m).padStart(2,'0')}-${String(lastD).padStart(2,'0')}`;
  }
  S.meudiaOutlookStatus = 'loading';
  render();
  try {
    const resp = await fetch(OUTLOOK_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({start, end})
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    S.meudiaOutlookEvents = Array.isArray(data) ? data : (data.value || []);
    S.meudiaOutlookStatus = 'ok';
  } catch(e) {
    S.meudiaOutlookStatus = 'error';
    console.warn('[GTI] Outlook fetch error:', e);
  }
  render();
}

// Drop na coluna do dia na view Semana — calcula horário pelo Y
function meudiaDragDropWeekCol(date, e) {
  e.preventDefault();
  e.currentTarget.classList.remove('meudia-drag-over');
  var id = _meudiaDragId || e.dataTransfer.getData('text/plain');
  if (!id) return;
  var item = S.meudiaItems.find(function(x){ return x.id === id; });
  if (!item) return;
  var rect = e.currentTarget.getBoundingClientRect();
  var relY = Math.max(0, e.clientY - rect.top);
  var START_HOUR = 7, HOUR_H = 48;
  var totalMins = (relY / HOUR_H) * 60;
  var absHour = Math.floor(START_HOUR + totalMins / 60);
  var minsFrac = totalMins % 60;
  var snappedMins = minsFrac < 15 ? 0 : minsFrac < 45 ? 30 : 0;
  var finalH = Math.max(START_HOUR, Math.min(absHour + (snappedMins === 0 && minsFrac >= 45 ? 1 : 0), 19));
  var timeStr = (finalH < 10 ? '0' : '') + finalH + ':' + (snappedMins < 10 ? '0' : '') + snappedMins;
  item.date = date;
  item.time = timeStr;
  saveMeuDia(); render();
}

function renderMeuDia() {
  const todayStr = new Date().toISOString().split('T')[0];

  const viewBtns = views.map(v=>`<button class="view-btn${S.meudiaView===v.key?' active':''}" onclick="meudiaSetView('${v.key}')">${v.label}</button>`).join('');

  // Date label
  let dateLabelStr = '';
  if (S.meudiaView === 'dia') {
    const d = new Date(S.meudiaDate + 'T12:00:00');
    const isToday = S.meudiaDate === todayStr;
    const label = d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    dateLabelStr = isToday ? 'Hoje — ' + label : label;
  } else if (S.meudiaView === 'semana') {
    const ws = meudiaGetWeekStart(S.meudiaDate);
    const we = new Date(ws + 'T12:00:00'); we.setDate(we.getDate() + 6);
    dateLabelStr = new Date(ws+'T12:00:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short'})
      + ' – ' + we.toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'});
  } else {
    const d = new Date(S.meudiaDate.slice(0,7) + '-01T12:00:00');
    const s = d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    dateLabelStr = s.charAt(0).toUpperCase() + s.slice(1);
  }

  // Outlook status bar
  let outlookBar = '';
  if (!OUTLOOK_URL) {
    outlookBar = `<div class="meudia-outlook-bar" style="background:#FFF8EC;border-color:#F5A623;">
      <span>⚙️</span>
      <span style="flex:1;">Reuniões do Outlook desativadas — <a href="#" onclick="event.preventDefault();alert('Para ativar: crie o fluxo GTI_Agenda no Power Automate e preencha a constante OUTLOOK_URL no HTML.')" style="color:#8393ff;font-weight:700;">Como ativar →</a></span>
    </div>`;
  } else if (S.meudiaOutlookStatus === 'loading') {
    outlookBar = `<div class="meudia-outlook-bar"><div class="meudia-outlook-dot loading"></div><span>Carregando reuniões do Outlook...</span></div>`;
  } else if (S.meudiaOutlookStatus === 'ok') {
    outlookBar = `<div class="meudia-outlook-bar"><div class="meudia-outlook-dot"></div><span>${S.meudiaOutlookEvents.length} reunião(ões) carregada(s) do Outlook</span></div>`;

      <button class="meudia-today-btn" onclick="meudiaGoToday()">Hoje</button>

}

function renderMeuDiaDayView() {
  const {personal, outlook} = meudiaEventsForDate(S.meudiaDate);
  const noTime = personal.filter(x => !x.time);
  const withTime = personal.filter(x => x.time);
  const HOUR_START = 7, HOUR_END = 22, SLOT_H = 64;
  const totalH = (HOUR_END - HOUR_START) * SLOT_H;

  // No-time section
  let noTimeHtml = '';
  if (noTime.length > 0 || outlook.filter(e=>e.isAllDay).length > 0) {
    const allDayItems = [
      ...outlook.filter(e=>e.isAllDay).map(e=>`
        <div class="meudia-quick-item">
          <span style="font-size:12px;">📅</span>
          <span class="meudia-item-title">${esc(e.subject||'')}</span>
          <span class="meudia-item-proj">Dia inteiro</span>
        </div>`),
      ...noTime.map(item=>`
        <div class="meudia-quick-item${item.done?' done':''}">
          <div class="meudia-item-checkbox${item.done?' checked':''}" onclick="event.stopPropagation();meudiaToggleItem('${item.id}')">${item.done?'✓':''}</div>
          <span class="meudia-item-title" onclick="meudiaOpenEdit('${item.id}')" style="cursor:pointer;">${esc(item.title)}</span>
          ${item.project?`<span class="meudia-item-proj">${esc(item.project)}</span>`:''}
          <button class="meudia-item-del" onclick="event.stopPropagation();meudiaDeleteItem('${item.id}')" title="Remover">✕</button>
        </div>`)
    ].join('');
    noTimeHtml = `<div class="meudia-no-time">
      <div class="meudia-no-time-title">Sem horário definido</div>
      <div class="meudia-no-time-items">${allDayItems}</div>
      <button onclick="meudiaOpenAdd('${S.meudiaDate}','')" style="margin-top:8px;background:none;border:1.5px dashed #C5D8E8;border-radius:6px;padding:4px 14px;color:#8393ff;font-size:12px;font-weight:600;cursor:pointer;width:100%;">+ Adicionar sem horário</button>
    </div>`;
  }

  // Now line
  const nowStr = new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit',hour12:false});
  const [nowH, nowM] = nowStr.split(':').map(n=>parseInt(n)||0);
  const todayStr = new Date().toISOString().split('T')[0];
  let nowLineHtml = '';
  if (S.meudiaDate === todayStr && nowH >= HOUR_START && nowH < HOUR_END) {
    const nowY = (nowH - HOUR_START) * SLOT_H + (nowM / 60) * SLOT_H;
    nowLineHtml = `<div class="meudia-now-line" style="top:${nowY}px;"><div class="meudia-now-dot"></div></div>`;
  }

  // Build hour rows
  let rows = '';
  for (let h = HOUR_START; h < HOUR_END; h++) {
    const label = h.toString().padStart(2,'0') + ':00';
    rows += `<div class="meudia-tl-row"
        ondragover="meudiaDragOver(event)"
        ondragleave="meudiaDragLeave(event)"
        ondrop="meudiaDragDropHour('${label}',event)"
        onclick="if(!_meudiaDragId)meudiaOpenAdd('${S.meudiaDate}','${label}')">
      <div class="meudia-tl-hour">${label}</div>
      <div class="meudia-tl-slot"></div>
    </div>`;
  }

  // Build events
  let eventsHtml = '';

  // Outlook events (timed)
  outlook.filter(e=>!e.isAllDay&&meudiaGetDT(e.start)).forEach(ev => {
    const st = meudiaEventBRTTime(meudiaGetDT(ev.start));
    const et = meudiaEventBRTTime(meudiaGetDT(ev.end));
    const [sh, sm] = st.split(':').map(n=>parseInt(n)||0);
    const [eh, em] = et.split(':').map(n=>parseInt(n)||0);
    const startH = sh + sm/60;
    const endH = eh + em/60;
    if (startH >= HOUR_END || endH <= HOUR_START) return;
    const top = Math.max(0, (startH - HOUR_START)) * SLOT_H;
    const height = Math.max(28, (Math.min(endH, HOUR_END) - Math.max(startH, HOUR_START)) * SLOT_H) - 4;
    const locHtml = ev.location ? `<div class="meudia-event-loc">📍 ${esc(ev.location)}</div>` : '';
    eventsHtml += `<div class="meudia-event outlook" style="top:${top+2}px;height:${height}px;left:62px;right:8px;"
        onclick="window.open('${ev.webLink||'#'}','_blank')" title="${esc(ev.subject||'')}">
      <div class="meudia-event-time">${st} – ${et}</div>
      <div class="meudia-event-title">${esc(ev.subject||'')}</div>
      ${locHtml}
    </div>`;
  });

  // Personal timed items
  withTime.forEach(item => {
    const [sh, sm] = item.time.split(':').map(n=>parseInt(n)||0);
    const startH = sh + sm/60;
    if (startH >= HOUR_END || startH < HOUR_START) return;
    const top = (startH - HOUR_START) * SLOT_H;
    eventsHtml += `<div class="meudia-event personal${item.done?' done':''}" style="top:${top+2}px;height:50px;left:62px;right:8px;cursor:grab;"
        draggable="true"
        ondragstart="meudiaDragStart('${item.id}',event)"
        ondragend="meudiaDragEnd(event)"
        onclick="if(!event.target.closest('.meudia-item-checkbox,.meudia-item-del'))meudiaOpenEdit('${item.id}')">
      <div style="display:flex;align-items:center;gap:5px;">
        <div class="meudia-item-checkbox${item.done?' checked':''}" onclick="event.stopPropagation();meudiaToggleItem('${item.id}')" style="pointer-events:auto;">${item.done?'✓':''}</div>
        <div>
          <div class="meudia-event-time">${item.time}${item.project?' · '+esc(item.project):''}</div>
          <div class="meudia-event-title">${esc(item.title)}</div>
        </div>
        <button class="meudia-item-del" onclick="event.stopPropagation();meudiaDeleteItem('${item.id}')" style="margin-left:auto;font-size:12px;pointer-events:auto;">✕</button>
      </div>
    </div>`;
  });

  return `${noTimeHtml}
    <div class="meudia-tl-grid">
      <div class="meudia-tl-rows">${rows}</div>
      <div class="meudia-events-layer">
        ${eventsHtml}
        ${nowLineHtml}
      </div>
    </div>`;
}

function renderMeuDiaWeekView() {
  var START_HOUR = 7, END_HOUR = 20, HOUR_H = 48;
  var TOTAL_H = (END_HOUR - START_HOUR) * HOUR_H;
  var DOWS = ['Seg','Ter','Qua','Qui','Sex','Sab','Dom'];
  var ws = meudiaGetWeekStart(S.meudiaDate);
  var todayStr = new Date().toISOString().split('T')[0];

  var headerCells = '', allDayCells = '', dayCols = '';

  for (var i = 0; i < 6; i++) {   // 6 dias: Seg-Sab (Dom oculto)
    var d = new Date(ws + 'T12:00:00'); d.setDate(d.getDate() + i);
    var dateStr = d.toISOString().split('T')[0];
    var isToday = dateStr === todayStr;
    var evData = meudiaEventsForDate(dateStr);
    var personal = evData.personal, outlook = evData.outlook;

    // Header
    headerCells += '<div class="meudia-tl-hdr' + (isToday ? ' today' : '') + '" onclick="meudiaSelectDate(\'' + dateStr + '\')">'
      + '<div class="meudia-tl-dow">' + DOWS[i] + '</div>'
      + '<div class="meudia-tl-dnum' + (isToday ? ' today' : '') + '">' + d.getDate() + '</div>'
      + '</div>';

    // All-day row
    var adHtml = outlook.filter(function(e){ return e.isAllDay; }).map(function(e){
      return '<div class="meudia-tl-ad outlook" title="' + esc(e.subject||'') + '">' + esc(e.subject||'Evento') + '</div>';
    }).join('');
    adHtml += personal.filter(function(e){ return !e.time; }).map(function(e){
      return '<div class="meudia-tl-ad personal' + (e.done?' done':'') + '"'
        + ' draggable="true"'
        + ' ondragstart="meudiaDragStart(\'' + e.id + '\',event)"'
        + ' ondragend="meudiaDragEnd(event)"'
        + ' onclick="meudiaOpenEdit(\'' + e.id + '\')" title="' + esc(e.title) + '">' + esc(e.title) + '</div>';
    }).join('');
    allDayCells += '<div class="meudia-tl-ad-cell">' + adHtml
      + '<div class="meudia-tl-ad-dropcell" ondragover="meudiaDragOver(event)" ondragleave="meudiaDragLeave(event)" ondrop="meudiaDragDropWeekAllDay(\'' + dateStr + '\',event)">'
      + '<button class="meudia-tl-addday" onclick="meudiaOpenAdd(\'' + dateStr + '\',\'\')"  title="Adicionar">+</button></div></div>';

    // Timed events
    var evHtml = '';

    // Outlook timed
    outlook.filter(function(e){ return !e.isAllDay && meudiaGetDT(e.start); }).forEach(function(e){
      var st = meudiaEventBRTTime(meudiaGetDT(e.start));
      var et = meudiaGetDT(e.end) ? meudiaEventBRTTime(meudiaGetDT(e.end)) : '';
      if (!st) return;
      var parts = st.split(':'); var sh = +parts[0], sm = +parts[1];
      var startMins = sh * 60 + sm;
      var top = (startMins - START_HOUR * 60) / 60 * HOUR_H;
      if (top < 0 || top >= TOTAL_H) return;
      var durationMins = 60;
      if (et) { var ep = et.split(':'); durationMins = Math.max(30, +ep[0]*60 + +ep[1] - startMins); }
      var height = Math.max(26, Math.min(durationMins / 60 * HOUR_H, TOTAL_H - top));
      var subj = esc(e.subject || 'Reuniao');
      var timeLabel = st + (et ? '–' + et : '');
      evHtml += '<div class="meudia-tl-ev outlook" style="top:' + top + 'px;height:' + height + 'px;"'
        + ' onclick="window.open(\'' + (e.webLink||'#') + '\',\'_blank\')" title="' + subj + '">'
        + '<div class="meudia-tl-ev-time">' + timeLabel + '</div>'
        + '<div class="meudia-tl-ev-title">' + subj + '</div>'
        + '</div>';
    });

    // Personal timed tasks
    personal.filter(function(e){ return !!e.time; }).forEach(function(e){
      var parts = e.time.split(':'); var sh = +parts[0], sm = +(parts[1]||0);
      var top = (sh * 60 + sm - START_HOUR * 60) / 60 * HOUR_H;
      if (top < 0 || top >= TOTAL_H) return;
      var title = esc(e.title);
      evHtml += '<div class="meudia-tl-ev personal' + (e.done?' done':'') + '" style="top:' + top + 'px;height:28px;"'
        + ' draggable="true"'
        + ' ondragstart="meudiaDragStart(\'' + e.id + '\',event)"'
        + ' ondragend="meudiaDragEnd(event)"'
        + ' onclick="meudiaOpenEdit(\'' + e.id + '\')" title="' + title + '">'
        + '<div class="meudia-tl-ev-time">' + e.time + '</div>'
        + '<div class="meudia-tl-ev-title">' + title + '</div>'
        + '</div>';
    });

    // Hour & half-hour lines
    var hLines = '';
    for (var h = START_HOUR; h < END_HOUR; h++) {
      hLines += '<div class="meudia-tl-hline" style="top:' + ((h - START_HOUR) * HOUR_H) + 'px;"></div>';
      hLines += '<div class="meudia-tl-hline half" style="top:' + ((h - START_HOUR) * HOUR_H + HOUR_H/2) + 'px;"></div>';
    }

    dayCols += '<div class="meudia-tl-dcol' + (isToday?' today':'') + '" style="height:' + TOTAL_H + 'px;"'
      + ' ondragover="meudiaDragOver(event)" ondragleave="meudiaDragLeave(event)"'
      + ' ondrop="meudiaDragDropWeekCol(\'' + dateStr + '\',event)">'
      + hLines + evHtml + '</div>';
  }

  // Time labels
  var timeLabels = '';
  for (var h = START_HOUR; h <= END_HOUR; h++) {
    var top = (h - START_HOUR) * HOUR_H;
    timeLabels += '<div class="meudia-tl-tlabel" style="top:' + top + 'px;">' + (h < 10 ? '0' : '') + h + ':00</div>';
  }

  // Current time red line
  var nowLine = '';
  try {
    var now = new Date(new Date().toLocaleString('en-US', {timeZone:'America/Sao_Paulo'}));
    var nowTop = (now.getHours() * 60 + now.getMinutes() - START_HOUR * 60) / 60 * HOUR_H;
    if (nowTop >= 0 && nowTop <= TOTAL_H) {
      nowLine = '<div class="meudia-tl-nowline" style="top:' + nowTop + 'px;"></div>';
    }
  } catch(e) {}

  return '<div class="meudia-tl-wrap">'
    + '<div class="meudia-tl-header"><div class="meudia-tl-corner"></div>' + headerCells + '</div>'
    + '<div class="meudia-tl-allday"><div class="meudia-tl-ad-label">Dia todo</div>' + allDayCells + '</div>'
    + '<div class="meudia-tl-body" style="height:' + TOTAL_H + 'px;">'
    +   '<div class="meudia-tl-timecol" style="height:' + TOTAL_H + 'px;">' + timeLabels + '</div>'
    +   '<div class="meudia-tl-daysarea" style="height:' + TOTAL_H + 'px;">' + dayCols + nowLine + '</div>'
    + '</div>'
    + '</div>';
}

function renderMeuDiaMonthView() {
  const todayStr = new Date().toISOString().split('T')[0];
  const [year, month] = S.meudiaDate.split('-').map(Number);
  const firstDay = new Date(year, month-1, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0
  const lastDay = new Date(year, month, 0).getDate();
  const DOWS = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const headerHtml = DOWS.map(d=>`<div class="meudia-month-dow">${d}</div>`).join('');
  let cells = '';
  // Prev month fill
  const prevM = month===1?12:month-1, prevY = month===1?year-1:year;
  const prevLastDay = new Date(prevY, prevM, 0).getDate();
  for (let i=0;i<startDow;i++) {
    const d = prevLastDay - startDow + 1 + i;
    const ds = `${prevY}-${String(prevM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells += `<div class="meudia-month-cell other-month"
        ondragover="meudiaDragOver(event)"
        ondragleave="meudiaDragLeave(event)"
        ondrop="meudiaDragDropMonthCell('${ds}',event)"
        onclick="if(!_meudiaDragId)meudiaSelectDate('${ds}')"><div class="meudia-month-num">${d}</div></div>`;
  }
  // Current month
  for (let d=1;d<=lastDay;d++) {
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const {personal, outlook} = meudiaEventsForDate(ds);
    const allEvs = [
      ...outlook.map(e=>({type:'outlook',label:e.subject||'',id:null})),
      ...personal.map(e=>({type:'personal',label:e.title,done:e.done,id:e.id}))
    ];
    const shown = allEvs.slice(0,3);
    const more = allEvs.length - 3;
    cells += `<div class="meudia-month-cell${isToday?' today-cell':''}"
        ondragover="meudiaDragOver(event)"
        ondragleave="meudiaDragLeave(event)"
        ondrop="meudiaDragDropMonthCell('${ds}',event)"
        onclick="if(!_meudiaDragId)meudiaSelectDate('${ds}')">
      <div class="meudia-month-num${isToday?' today':''}">${d}</div>
      ${shown.map(e=>e.type==='personal'
        ? `<div class="meudia-month-event personal${e.done?' done':''}" draggable="true" ondragstart="meudiaDragStart('${e.id}',event)" ondragend="meudiaDragEnd(event)" onclick="event.stopPropagation();meudiaOpenEdit('${e.id}')">${esc(e.label)}</div>`
        : `<div class="meudia-month-event ${e.type}${e.done?' done':''}">${esc(e.label)}</div>`
      ).join('')}
      ${more>0?`<div class="meudia-month-more">+${more}</div>`:''}
    </div>`;
  }
  // Next month fill
  const total = startDow + lastDay;
  const remainder = total%7===0 ? 0 : 7-(total%7);
  const nextM = month===12?1:month+1, nextY = month===12?year+1:year;
  for (let d=1;d<=remainder;d++) {
    const ds = `${nextY}-${String(nextM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells += `<div class="meudia-month-cell other-month"
        ondragover="meudiaDragOver(event)"
        ondragleave="meudiaDragLeave(event)"
        ondrop="meudiaDragDropMonthCell('${ds}',event)"
        onclick="if(!_meudiaDragId)meudiaSelectDate('${ds}')"><div class="meudia-month-num">${d}</div></div>`;
  }
  return `<div class="meudia-month-wrap">
    <div class="meudia-month-header">${headerHtml}</div>
    <div class="meudia-month-grid">${cells}</div>
  </div>`;
}

let PBI_STATUS = {};        // { modelName: { state, startTime, endTime } }
let PBI_GROUP_STATUS = {};  // { groupName: { state, startTime, endTime } } — independent from models
let _pbiTicker = null;

function pbiState(m) { return (PBI_STATUS[m] && PBI_STATUS[m].state) || 'idle'; }

function pbiGroupState(g) {
  return (PBI_GROUP_STATUS[g] && PBI_GROUP_STATUS[g].state) || 'idle';
}

function pbiPct(m) {
  const st = PBI_STATUS[m];
  if (!st || st.state !== 'loading') return 0;
  return Math.min(95, (Date.now() - st.startTime) / (PBI_ESTIMATED_MINS * 60000) * 100);
}

function pbiGroupPct(g) {
  const st = PBI_GROUP_STATUS[g];
  if (!st || st.state !== 'loading') return 0;
  return Math.min(95, (Date.now() - st.startTime) / (PBI_ESTIMATED_MINS * 60000) * 100);
}

function pbiStartTicker() {
  if (_pbiTicker) return;
  _pbiTicker = setInterval(() => {
    let anyLoading = false;
    PBI_MODELS.forEach(m => {
      const st = PBI_STATUS[m];
      if (st && st.state === 'loading') {
        if (Date.now() - st.startTime >= PBI_ESTIMATED_MINS * 60000) {
          PBI_STATUS[m] = { state: 'done', endTime: Date.now() };
        } else { anyLoading = true; }
      }
    });
    Object.keys(PBI_GROUP_STATUS).forEach(g => {
      const st = PBI_GROUP_STATUS[g];
      if (st && st.state === 'loading') {
        if (Date.now() - st.startTime >= PBI_ESTIMATED_MINS * 60000) {
          PBI_GROUP_STATUS[g] = { state: 'done', endTime: Date.now() };
        } else { anyLoading = true; }
      }
    });
    renderPbiWidget();
    if (!anyLoading) { clearInterval(_pbiTicker); _pbiTicker = null; }
  }, 5000);
}

function renderPbiWidget() {
  const el = document.getElementById('pbi-widget');
  if (el) el.innerHTML = buildPbiWidgetHtml();
}

async function pbiTriggerModel(modelName) {
  if (!PBI_REFRESH_URL) { alert('Configure a constante PBI_REFRESH_URL com a URL do fluxo GTI_PBI_Refresh.'); return; }
  if (pbiState(modelName) === 'loading') return;
  PBI_STATUS[modelName] = { state: 'loading', startTime: Date.now() };
  renderPbiWidget();
  pbiStartTicker();
  try {
    const r = await fetch(PBI_REFRESH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: modelName })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch(e) {
    if (PBI_STATUS[modelName] && PBI_STATUS[modelName].state === 'loading')
      PBI_STATUS[modelName] = { state: 'error', endTime: Date.now(), errorMsg: e.message };
    renderPbiWidget();
  }
}

async function pbiTriggerGroup(groupName) {
  if (!PBI_REFRESH_URL) { alert('Configure a constante PBI_REFRESH_URL com a URL do fluxo GTI_PBI_Refresh.'); return; }
  if (pbiGroupState(groupName) === 'loading') return;
  PBI_GROUP_STATUS[groupName] = { state: 'loading', startTime: Date.now() };
  renderPbiWidget();
  pbiStartTicker();
  let firstErr = null;
  await Promise.all(PBI_GROUPS[groupName].map(async m => {
    try {
      const r = await fetch(PBI_REFRESH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: m })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
    } catch(e) {
      if (!firstErr) firstErr = e.message;
    }
  }));
  if (firstErr) {
    PBI_GROUP_STATUS[groupName] = { state: 'error', endTime: Date.now(), errorMsg: firstErr };
    renderPbiWidget();
  }
}

function pbiClickModel(btn) { pbiTriggerModel(btn.dataset.model); }
function pbiClickGroup(btn) { pbiTriggerGroup(btn.dataset.group); }

function buildPbiWidgetHtml() {
  try {
    var cfg = !!PBI_REFRESH_URL;
    var anyLoading = PBI_MODELS.some(function(m){ return pbiState(m) === 'loading'; })
      || Object.values(PBI_GROUP_STATUS).some(function(s){ return s && s.state === 'loading'; });
    var anyDone = PBI_MODELS.some(function(m){ return pbiState(m) === 'done'; })
      || Object.values(PBI_GROUP_STATUS).some(function(s){ return s && s.state === 'done'; });
    var anyError = PBI_MODELS.some(function(m){ return pbiState(m) === 'error'; })
      || Object.values(PBI_GROUP_STATUS).some(function(s){ return s && s.state === 'error'; });

    var statusBadge = anyLoading
      ? '<span class="pbi-badge loading">&#9203; Atualizando</span>'
      : (!anyLoading && anyDone && !anyError)
        ? '<span class="pbi-badge done">&#10003; Conclui&#769;do</span>'
        : !cfg
          ? '<span class="pbi-badge warn">&#9881; Fluxo na&#771;o configurado</span>'
          : '';

    var groupBtns = Object.entries(PBI_GROUPS).filter(function(entry){ return entry[1].some(function(m){ return canAccessPBI(m); }); }).map(function(entry) {
      var g = entry[0], models = entry[1];
      var gs  = pbiGroupState(g);
      var pct = pbiGroupPct(g);
      var icoMap = {idle:'&#128260;', loading:'&#9203;', done:'&#9989;', error:'&#9888;'};
      var gst = PBI_GROUP_STATUS[g];
      var errDetail = (gst && gst.errorMsg) ? ' (' + gst.errorMsg + ')' : '';
      var lblMap = {
        idle:    'Clique para atualizar',
        loading: 'Atualizando... ' + Math.round(pct) + '%',
        done:    'Concluído com sucesso',
        error:   'Erro' + errDetail + ' — tentar novamente'
      };
      var ico  = icoMap[gs] || '';
      var lbl  = lblMap[gs] || '';
      var cls  = 'pbi-group-btn ' + gs + (cfg ? '' : ' unconfigured');
      var attrs = cfg ? ('data-group="' + g + '" onclick="pbiClickGroup(this)"') : '';
      var dis  = gs === 'loading' ? 'disabled' : '';
      var prog = gs === 'loading'
        ? '<div class="pbi-gbar"><div class="pbi-gbar-fill" style="width:' + pct + '%"></div></div>'
        : '';
      return '<button class="' + cls + '" ' + attrs + ' ' + dis + '>'
        + '<div class="pbi-group-name">' + ico + ' ' + g + '</div>'
        + '<div class="pbi-group-sub">' + models.length + ' modelos</div>'
        + '<div class="pbi-group-status">' + lbl + '</div>'
        + prog
        + '</button>';
    }).join('');

    var visiblePbiModels = PBI_MODELS.filter(function(m){ return canAccessPBI(m); });
    var modelBtns = visiblePbiModels.map(function(model) {
      var ms  = pbiState(model);
      var pct = pbiPct(model);
      var st  = PBI_STATUS[model];
      var statusHtml = '';
      if (ms === 'idle') {
        statusHtml = '<div class="pbi-model-status">Aguardando</div>';
      } else if (ms === 'loading') {
        statusHtml = '<div class="pbi-model-status loading"><span class="pbi-spin">&#8635;</span>&nbsp;'
          + Math.round(pct) + '%</div>'
          + '<div class="pbi-mbar"><div class="pbi-mbar-fill" style="width:' + pct + '%"></div></div>';
      } else if (ms === 'done') {
        var t = (st && st.endTime)
          ? new Date(st.endTime).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
          : '';
        statusHtml = '<div class="pbi-model-status done">&#10003; ' + t + '</div>';
      } else if (ms === 'error') {
        var errDetail = (st && st.errorMsg) ? ' (' + st.errorMsg + ')' : '';
        statusHtml = '<div class="pbi-model-status error">&#10005; Erro' + errDetail + '</div>';
      }
      var dis   = ms === 'loading' ? 'disabled' : '';
      var cls   = 'pbi-model-btn ' + ms + (cfg ? '' : ' unconfigured');
      var attrs = cfg ? ('data-model="' + model + '" onclick="pbiClickModel(this)"') : '';
      return '<button class="' + cls + '" ' + attrs + ' ' + dis + ' title="' + model + '">'
        + '<div class="pbi-model-name">' + model + '</div>'
        + statusHtml
        + '</button>';
    }).join('');

    return '<div class="pbi-widget-header">'
      + '<div class="pbi-widget-title">'
      + '<span style="font-size:17px;line-height:1;">&#9889;</span>'
      + '<span>Atualização Power BI</span>'
      + statusBadge
      + '</div></div>'
      + '<div class="pbi-group-row">' + groupBtns + '</div>'
      + '<div class="pbi-section-lbl">Individuais</div>'
      + '<div class="pbi-models-grid">' + modelBtns + '</div>';
  } catch(e) {
    console.error('PBI widget error:', e);
    return '<div style="padding:10px;color:#C0392B;">Erro no widget PBI: ' + (e && e.message) + '</div>';
  }
}

</script>
